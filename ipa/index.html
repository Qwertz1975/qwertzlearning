<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz IPA</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            startup: {
                pageReady: () => {
                    return MathJax.startup.defaultPageReady();
                }
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* Glassmorphism Premium UI */
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            display: flex;
            justify-content: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: -webkit-linear-gradient(#fff, #a1c4fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Music Player Styling */
        .music-section {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .custom-file-upload {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .custom-file-upload:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        input[type="file"] {
            display: none;
        }

        audio {
            width: 100%;
            max-width: 400px;
            border-radius: 30px;
            outline: none;
        }

        /* Question Cards */
        .question-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            transition: transform 0.3s ease;
        }

        .question-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.06);
        }

        .question-text {
            font-size: 1.1em;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .ai-image-placeholder {
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            margin: 15px 0;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-label {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .option-label:hover {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        input[type="radio"] {
            margin-right: 15px;
            cursor: pointer;
            accent-color: #4facfe;
        }

        /* Submit Button */
        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.5);
        }

        /* Evaluation & Explanations */
        #evaluation-result {
            display: none;
            margin-top: 30px;
            text-align: center;
        }

        .score-box {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            padding: 20px;
            border-radius: 16px;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 30px;
            color: #00ff88;
        }

        .explanation-box {
            display: none;
            background: rgba(0, 0, 0, 0.3);
            border-left: 5px solid #4facfe;
            padding: 20px;
            border-radius: 0 12px 12px 0;
            margin-top: 20px;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .explanation-box.correct { border-left-color: #00ff88; }
        .explanation-box.wrong { border-left-color: #ff4757; }

        .physics-format p { margin: 5px 0; }
        .physics-format strong { color: #a1c4fd; }
        
        .correct-ans { background: rgba(0, 255, 136, 0.2) !important; border: 1px solid #00ff88 !important; }
        .wrong-ans { background: rgba(255, 71, 87, 0.2) !important; border: 1px solid #ff4757 !important; }
    </style>
</head>
<body>

    <div class="glass-container">
        <h1>Quiz IPA</h1>
        
        <div class="music-section">
            <label for="musicInput" class="custom-file-upload">
                🎵 Tambahkan Musik Background (Opsional)
            </label>
            <input type="file" id="musicInput" accept="audio/*">
            <audio id="audioPlayer" controls></audio>
        </div>

        <div id="quiz-form">
            </div>

        <button class="submit-btn" id="submitBtn" onclick="evaluateQuiz()">Evaluasi Jawaban</button>

        <div id="evaluation-result">
            <div class="score-box" id="scoreDisplay"></div>
        </div>
    </div>

    <script>
        // Music Player Logic
        document.getElementById('musicInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const url = URL.createObjectURL(file);
                const audio = document.getElementById('audioPlayer');
                audio.src = url;
                audio.style.display = 'block';
                audio.play();
            }
        });

        // Quiz Data
        const questions = [
            {
                id: 1,
                text: "1. Rama melakukan percobaan pengukuran ketebalan uang logam dengan menggunakan micrometer sekrup, dengan hasil seperti gambar berikut!",
                image: "https://placehold.co/600x250/1a1a1a/4facfe?text=Diagram+Mikrometer+Sekrup%0A(Skala+Utama+7.0mm,+Skala+Nonius+23)",
                options: ["7,23 mm", "7,73 mm", "8,23 mm", "8,78 mm"],
                correct: 0,
                isPhysics: true,
                explanation: {
                    diketahui: "Skala Utama (SU) = 7,0 mm<br>Skala Nonius (SN) = 23 × 0,01 mm = 0,23 mm",
                    ditanya: "Ketebalan uang logam (Hasil Pengukuran)?",
                    rumus: "$$Hasil = SU + SN$$",
                    jawab: "$$Hasil = 7,0\\text{ mm} + 0,23\\text{ mm} = 7,23\\text{ mm}$$",
                    kesimpulan: "Jadi, ketebalan uang logam yang terukur adalah 7,23 mm."
                }
            },
            {
                id: 2,
                text: "2. Pada sebuah balok terdapat tiga gaya yang bekerja seperti pada gambar tersebut. Jika massa balok 2.500 gr, besar dan arah percepatan balok adalah ....",
                image: "https://placehold.co/600x250/1a1a1a/4facfe?text=Diagram+Balok+dan+Gaya%0AF1=10N+(kiri),+F2=14N+(kanan),+F3=8N+(kiri)",
                options: ["1,0 m/s² ke kanan", "1,6 m/s² ke kiri", "2,2 m/s² ke kanan", "2,8 m/s² ke kiri"],
                correct: 1,
                isPhysics: true,
                explanation: {
                    diketahui: "$$F_1 = 10\\text{ N (ke kiri)}$$<br>$$F_2 = 14\\text{ N (ke kanan)}$$<br>$$F_3 = 8\\text{ N (ke kiri)}$$<br>$$m = 2.500\\text{ gr} = 2,5\\text{ kg}$$",
                    ditanya: "Besar dan arah percepatan balok ($$a$$)?",
                    rumus: "$$\\Sigma F = m \\cdot a$$",
                    jawab: "$$\\Sigma F = F_2 - (F_1 + F_3)$$<br>$$\\Sigma F = 14 - (10 + 8) = 14 - 18 = -4\\text{ N}$$ (Tanda negatif menunjukkan arah resultan gaya ke kiri).<br>$$a = \\frac{\\Sigma F}{m} = \\frac{4}{2,5} = 1,6\\text{ m/s}^2$$",
                    kesimpulan: "Percepatan balok adalah 1,6 m/s² dengan arah ke kiri."
                }
            },
            {
                id: 3,
                text: "3. Perhatikan gambar berikut! Jika percepatan gravitasi 9,8 m/s², energi potensialnya adalah ...",
                image: "https://placehold.co/600x250/1a1a1a/4facfe?text=Ilustrasi+Pohon+Kelapa%0Amassa+=+0.5+kg,+tinggi+=+5+m",
                options: ["24,5 J", "49,0 J", "245 J", "490 J"],
                correct: 0,
                isPhysics: true,
                explanation: {
                    diketahui: "$$m = 0,5\\text{ kg}$$<br>$$h = 5\\text{ m}$$<br>$$g = 9,8\\text{ m/s}^2$$",
                    ditanya: "Energi Potensial ($$E_p$$)?",
                    rumus: "$$E_p = m \\cdot g \\cdot h$$",
                    jawab: "$$E_p = 0,5 \\cdot 9,8 \\cdot 5$$<br>$$E_p = 24,5\\text{ Joule}$$",
                    kesimpulan: "Energi potensial buah tersebut adalah 24,5 J."
                }
            },
            {
                id: 4,
                text: "4. Perhatikan tuas di bawah ini! Untuk menahan beban 300 N, agar berada pada posisi seimbang, besar gaya F yang harus diberikan adalah ....",
                image: "https://placehold.co/600x250/1a1a1a/4facfe?text=Diagram+Tuas%0ALengan+Beban+=+0.5m,+Lengan+Kuasa+=+1.5m",
                options: ["50 N", "100 N", "150 N", "200 N"],
                correct: 1,
                isPhysics: true,
                explanation: {
                    diketahui: "Beban ($$W$$) = 300 N<br>Lengan Beban ($$L_w$$) = $$\\frac{1}{2}\\text{ m} = 0,5\\text{ m}$$<br>Lengan Kuasa ($$L_f$$) = $$1\\frac{1}{2}\\text{ m} = 1,5\\text{ m}$$",
                    ditanya: "Gaya Kuasa ($$F$$)?",
                    rumus: "$$W \\cdot L_w = F \\cdot L_f$$",
                    jawab: "$$300 \\cdot 0,5 = F \\cdot 1,5$$<br>$$150 = 1,5 \\cdot F$$<br>$$F = \\frac{150}{1,5} = 100\\text{ N}$$",
                    kesimpulan: "Besar gaya F yang harus diberikan adalah 100 N."
                }
            },
            {
                id: 5,
                text: "5. Perhatikan gambar rangkaian listrik di bawah ini! Jika R₁ = R₂ = 10 Ω dan R₃ = R₄ = 8 Ω, dan V = 12 V. Besar kuat arus yang mengalir pada rangkaian adalah ...",
                image: "https://placehold.co/600x250/1a1a1a/4facfe?text=Rangkaian+Listrik%0AR1,R2+(Seri)+lalu+bercabang+R3,R4+(Paralel)",
                options: ["0,5 A", "2,0 A", "36,0 A", "288 A"],
                correct: 0,
                isPhysics: true,
                explanation: {
                    diketahui: "$$R_1 = 10\\ \\Omega,\\ R_2 = 10\\ \\Omega$$ (Seri)<br>$$R_3 = 8\\ \\Omega,\\ R_4 = 8\\ \\Omega$$ (Paralel)<br>$$V = 12\\text{ V}$$",
                    ditanya: "Kuat Arus Total ($$I$$)?",
                    rumus: "$$I = \\frac{V}{R_{total}}$$<br>$$R_p = \\frac{R_3 \\cdot R_4}{R_3 + R_4}$$<br>$$R_s = R_1 + R_2$$",
                    jawab: "Hambatan paralel ($$R_p$$): $$\\frac{1}{R_p} = \\frac{1}{8} + \\frac{1}{8} = \\frac{2}{8} \\implies R_p = 4\\ \\Omega$$<br>Hambatan seri ($$R_s$$): $$R_s = 10 + 10 = 20\\ \\Omega$$<br>Hambatan Total: $$R_{total} = R_s + R_p = 20 + 4 = 24\\ \\Omega$$<br>Kuat Arus: $$I = \\frac{12}{24} = 0,5\\text{ A}$$",
                    kesimpulan: "Besar kuat arus yang mengalir adalah 0,5 A."
                }
            },
            {
                id: 6,
                text: "6. Perhatikan beberapa perubahan materi berikut ini: 1) Lilin meleleh, 2) Pakaian basah yang di jemur, 3) Bensin di bakar, 4) Emas di lebur, 5) Sumbu lilin yang dibakar, 6) Fotosintesis. Dari pernyataan tersebut yang merupakan perubahan fisika terdapat pada nomor....",
                image: "", // No image for this question
                options: ["1, 2 dan 3", "1, 2 dan 4", "3, 5 dan 6", "4, 5 dan 6"],
                correct: 1,
                isPhysics: false,
                explanation: {
                    kesimpulan: "Perubahan fisika adalah perubahan materi yang tidak menghasilkan zat baru, melainkan hanya perubahan wujud atau bentuk. <br><br>1) Lilin meleleh (Fisika - wujud padat ke cair)<br>2) Pakaian basah dijemur (Fisika - air menguap)<br>3) Bensin dibakar (Kimia - pembakaran)<br>4) Emas dilebur (Fisika - wujud padat ke cair)<br>5) Sumbu lilin dibakar (Kimia - pembakaran)<br>6) Fotosintesis (Kimia - reaksi pembuatan makanan)<br><br>Jadi jawaban yang tepat adalah 1, 2, dan 4."
                }
            }
        ];

        const quizForm = document.getElementById('quiz-form');

        // Render Questions
        questions.forEach((q, index) => {
            let optionsHTML = '';
            q.options.forEach((opt, i) => {
                optionsHTML += `
                    <label class="option-label" id="label-q${index}-o${i}">
                        <input type="radio" name="q${index}" value="${i}">
                        <span class="option-text">${opt}</span>
                    </label>
                `;
            });

            let imageHTML = q.image ? `<img src="${q.image}" alt="Gambar Soal ${index+1}" class="ai-image-placeholder">` : '';

            // Format Penjelasan
            let explanationContent = '';
            if (q.isPhysics) {
                explanationContent = `
                    <div class="physics-format">
                        <p><strong>Diketahui:</strong><br>${q.explanation.diketahui}</p>
                        <p><strong>Ditanya:</strong><br>${q.explanation.ditanya}</p>
                        <p><strong>Jawab:</strong></p>
                        <p><strong>Rumus:</strong><br>${q.explanation.rumus}</p>
                        <p><strong>Jawaban:</strong><br>${q.explanation.jawab}<br><br><strong>${q.explanation.kesimpulan}</strong></p>
                    </div>
                `;
            } else {
                explanationContent = `<p>${q.explanation.kesimpulan}</p>`;
            }

            const questionHTML = `
                <div class="question-card" id="card-q${index}">
                    <div class="question-text">${q.text}</div>
                    ${imageHTML}
                    <div class="options-container">
                        ${optionsHTML}
                    </div>
                    <div class="explanation-box" id="exp-q${index}">
                        <h4>📘 Pembahasan:</h4>
                        ${explanationContent}
                    </div>
                </div>
            `;
            quizForm.innerHTML += questionHTML;
        });

        // Evaluate Quiz Function
        function evaluateQuiz() {
            let score = 0;
            
            questions.forEach((q, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                const explanationBox = document.getElementById(`exp-q${index}`);
                
                // Reset styling
                q.options.forEach((_, i) => {
                    document.getElementById(`label-q${index}-o${i}`).classList.remove('correct-ans', 'wrong-ans');
                });

                if (selected) {
                    const selectedValue = parseInt(selected.value);
                    if (selectedValue === q.correct) {
                        score++;
                        document.getElementById(`label-q${index}-o${selectedValue}`).classList.add('correct-ans');
                        explanationBox.classList.add('correct');
                    } else {
                        document.getElementById(`label-q${index}-o${selectedValue}`).classList.add('wrong-ans');
                        document.getElementById(`label-q${index}-o${q.correct}`).classList.add('correct-ans');
                        explanationBox.classList.add('wrong');
                    }
                } else {
                    // If not answered, highlight correct answer
                    document.getElementById(`label-q${index}-o${q.correct}`).classList.add('correct-ans');
                    explanationBox.classList.add('wrong');
                }
                
                // Show Explanation
                explanationBox.style.display = 'block';
            });

            // Re-render MathJax inside newly shown elements
            MathJax.typesetPromise();

            // Show Score
            const resultDiv = document.getElementById('evaluation-result');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const total = questions.length;
            const percentage = Math.round((score / total) * 100);
            
            scoreDisplay.innerHTML = `Skor Anda: ${score} dari ${total} (${percentage} / 100)`;
            resultDiv.style.display = 'block';
            
            // Scroll to results
            resultDiv.scrollIntoView({ behavior: 'smooth' });
            
            // Disable button after submit
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').innerText = "Evaluasi Selesai";
            document.getElementById('submitBtn').style.opacity = '0.5';
        }
    </script>
</body>
</html>
