<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz IPA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            /* Warna background gelap sesuai foto */
            background-color: #0b1120;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #f8fafc;
        }

        .container {
            /* Warna card slightly lighter */
            background-color: #1e293b;
            width: 100%;
            max-width: 600px;
            border-radius: 16px;
            padding: 30px 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* Fitur Audio (Disesuaikan dengan tema gelap) */
        .music-player {
            background-color: #0f172a;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: center;
            border: 1px solid #334155;
        }

        .music-player label {
            display: block;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 10px;
            font-size: 14px;
        }

        input[type="file"] {
            display: block;
            margin: 0 auto;
            font-size: 12px;
            color: #94a3b8;
        }

        audio {
            width: 100%;
            margin-top: 10px;
            height: 35px;
            outline: none;
        }

        /* Header Quiz (Mirip foto) */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .question-counter {
            color: #94a3b8;
            font-size: 14px;
            font-weight: 600;
        }

        .badge {
            background-color: #6366f1; /* Warna ungu seperti di foto */
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 20px;
            line-height: 1.5;
            white-space: pre-line;
        }

        /* Styling untuk Gambar Soal */
        .question-img {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            background-color: #0f172a;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid #334155;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #0f172a; /* Warna tombol pilihan */
            border: 1px solid transparent;
            padding: 18px 20px;
            border-radius: 12px;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            color: #e2e8f0;
            display: flex;
            align-items: center;
        }

        .option-letter {
            color: #94a3b8;
            margin-right: 15px;
            font-weight: 700;
        }

        .option-btn:hover:not(:disabled) {
            background-color: #334155;
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background-color: rgba(34, 197, 94, 0.2);
            border: 1px solid #22c55e;
            color: #4ade80;
        }

        .option-btn.correct .option-letter {
            color: #4ade80;
        }

        .option-btn.wrong {
            background-color: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #f87171;
        }

        .option-btn.wrong .option-letter {
            color: #f87171;
        }

        /* Box Pembahasan */
        .explanation {
            margin-top: 25px;
            padding: 20px;
            background-color: #334155;
            border-left: 4px solid #f59e0b;
            border-radius: 8px;
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .explanation h3 {
            color: #fbbf24;
            font-size: 15px;
            margin-bottom: 8px;
        }

        .explanation p {
            font-size: 14px;
            line-height: 1.6;
            color: #cbd5e1;
        }

        .next-btn {
            margin-top: 20px;
            background-color: #6366f1;
            color: white;
            border: none;
            padding: 16px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s ease;
            display: none;
        }

        .next-btn:hover {
            background-color: #4f46e5;
        }

        .score-board {
            text-align: center;
            display: none;
            padding: 40px 0;
        }

        .score-board h2 {
            font-size: 28px;
            color: #f8fafc;
            margin-bottom: 10px;
        }

        .score-board p {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .restart-btn {
            background-color: #22c55e;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="music-player" id="music-section">
            <label for="audio-upload">🎵 Tambahkan Musik Latar (.mp3):</label>
            <input type="file" id="audio-upload" accept="audio/*">
            <audio id="audio-player" controls loop style="display:none;"></audio>
        </div>

        <div id="quiz-area">
            <div class="quiz-header">
                <div class="question-counter" id="question-counter">Soal 1 dari 5</div>
                <div class="badge">IPA SMP</div>
            </div>

            <div class="question-box">
                <p class="question-text" id="question-text">Memuat pertanyaan...</p>
                <img id="question-img" class="question-img" src="" alt="Gambar Soal (Silakan masukkan file gambar)">
            </div>
            
            <div class="options" id="options-container">
                </div>

            <div class="explanation" id="explanation-box">
                <h3>👨‍🏫 Penjelasan Guru:</h3>
                <p id="explanation-text"></p>
            </div>

            <button class="next-btn" id="next-btn" onclick="nextQuestion()">Soal Selanjutnya</button>
        </div>

        <div class="score-board" id="score-board">
            <h2>Quiz Selesai! 🎉</h2>
            <p>Skor kamu: <strong id="final-score" style="color: white; font-size: 20px;">0</strong> dari 5</p>
            <button class="restart-btn" onclick="restartQuiz()">Ulangi Quiz</button>
        </div>
    </div>

    <script>
        // Data Soal (Diambil KHUSUS soal bergambar dari ujian)
        // PENTING: Ganti tulisan di dalam 'image' dengan nama file hasil crop kamu.
        const questions = [
            {
                question: "Rama melakukan percobaan pengukuran ketebalan uang logam dengan menggunakan micrometer sekrup, dengan hasil seperti gambar berikut!\n\nKetebalan uang logam yang terukur adalah ....",
                image: "gambar-mikrometer.jpg", // TINGGAL GANTI NAMA FILE INI
                options: ["7,23 mm", "7,73 mm", "8,23 mm", "8,78 mm"],
                answer: 1, 
                explanation: "Cara bacanya gampang! Liat skala utama (yang di kiri) itu angkanya udah ngelewatin garis 7,5 mm. Terus liat skala nonius (yang diputar di kanan), garis yang lurus sejajar itu angka 23, artinya 0,23 mm. Tinggal ditambah deh: 7,5 + 0,23 = 7,73 mm."
            },
            {
                question: "Perhatikan tuas di bawah ini!\nUntuk menahan beban 300 N, agar berada posisi seimbang, besar gaya F yang harus diberikan adalah ....",
                image: "gambar-tuas.jpg", // TINGGAL GANTI NAMA FILE INI
                options: ["50 N", "100 N", "150 N", "200 N"],
                answer: 1,
                explanation: "Inget rumus pengungkit: Beban × Lengan Beban = Kuasa × Lengan Kuasa (W × Lb = F × Lk). Di gambar, Lb = ½ m (0,5), Lk = 1 ½ m (1,5), dan Beban (W) = 300 N. Jadi: 300 × 0,5 = F × 1,5. Berarti 150 = 1,5 F. Maka F = 150 / 1,5 = 100 N."
            },
            {
                question: "Perhatikan gambar rangkaian listrik dibawah ini!\nJika R1 = R2 = 10 Ω dan R3 = R4 = 8 Ω. Besar kuat arus (I) yang mengalir pada rangkaian adalah ... (V = 12 V)",
                image: "gambar-listrik.jpg", // TINGGAL GANTI NAMA FILE INI
                options: ["0,5 A", "2,0 A", "36,0 A", "288 A"],
                answer: 0,
                explanation: "Pertama, cari hambatan pengganti yang paralel (R3 & R4): 1/Rp = 1/8 + 1/8 = 2/8, jadi Rp = 8/2 = 4 Ω. Terus tambahin semua hambatannya (seri): 10 + 10 + 4 = 24 Ω. Terakhir masukin rumus hukum Ohm I = V/R, jadi 12 Volt dibagi 24 Ohm = 0,5 Ampere."
            },
            {
                question: "Perhatikan gambar!\nKeping bimetal terdiri dari keping berwarna hitam (koefisien 0,000019/°C) dan keping putih (koefisien 0,000017/°C). Gambar keping bimetal yang tepat setelah dipanaskan ditunjukkan pada nomor ....",
                image: "gambar-bimetal.jpg", // TINGGAL GANTI NAMA FILE INI
                options: ["I", "II", "III", "IV"],
                answer: 0,
                explanation: "Prinsip bimetal itu: kalau dipanaskan, dia bakal melengkung ke arah logam yang koefisien muainya LEBIH KECIL. Karena yang putih lebih kecil angkanya (17 < 19), maka bimetal melengkung ke arah putih (putih di bagian dalam, hitam di bagian luar alias gambar I)."
            },
            {
                question: "Perhatikan gambar berikut!\nJika potensial gravitasi 9,8 m/s², energi potensial dari buah kelapa (m = 0,5 kg) yang jatuh dari pohon setinggi 5 m adalah ...",
                image: "gambar-kelapa.jpg", // TINGGAL GANTI NAMA FILE INI
                options: ["24,5 J", "49,0 J", "245 J", "490 J"],
                answer: 0,
                explanation: "Rumus Energi Potensial itu sangat gampang: Ep = m × g × h (massa dikali gravitasi dikali ketinggian). Tinggal kita kalikan aja semuanya dari gambar: 0,5 kg × 9,8 m/s² × 5 meter = 24,5 Joule."
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let hasAnswered = false;

        const questionCounter = document.getElementById("question-counter");
        const questionText = document.getElementById("question-text");
        const questionImg = document.getElementById("question-img");
        const optionsContainer = document.getElementById("options-container");
        const explanationBox = document.getElementById("explanation-box");
        const explanationText = document.getElementById("explanation-text");
        const nextBtn = document.getElementById("next-btn");
        const quizArea = document.getElementById("quiz-area");
        const scoreBoard = document.getElementById("score-board");
        const finalScoreText = document.getElementById("final-score");
        const audioUpload = document.getElementById("audio-upload");
        const audioPlayer = document.getElementById("audio-player");

        // Musik 
        audioUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                audioPlayer.src = URL.createObjectURL(file);
                audioPlayer.style.display = 'block';
                audioPlayer.play();
            }
        });

        function loadQuestion() {
            hasAnswered = false;
            explanationBox.style.display = "none";
            nextBtn.style.display = "none";
            optionsContainer.innerHTML = "";

            const currentQ = questions[currentQuestionIndex];
            
            questionCounter.innerText = `Soal ${currentQuestionIndex + 1} dari ${questions.length}`;
            questionText.innerText = currentQ.question;

            // Logic memuat gambar
            if (currentQ.image !== "") {
                questionImg.src = currentQ.image;
                questionImg.style.display = "block";
            } else {
                questionImg.style.display = "none";
            }

            // Generate Tombol Pilihan sesuai desain foto (Ada huruf A, B, C, D di kiri)
            currentQ.options.forEach((option, index) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                
                const letter = String.fromCharCode(65 + index); // A, B, C, D
                
                // Masukkan huruf dan text jawaban
                btn.innerHTML = `<span class="option-letter">${letter}.</span> ${option}`;
                
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, selectedBtn) {
            if (hasAnswered) return;
            hasAnswered = true;

            const currentQ = questions[currentQuestionIndex];
            const allBtns = optionsContainer.querySelectorAll(".option-btn");

            allBtns.forEach(btn => btn.disabled = true);

            if (selectedIndex === currentQ.answer) {
                selectedBtn.classList.add("correct");
                score++;
            } else {
                selectedBtn.classList.add("wrong");
                allBtns[currentQ.answer].classList.add("correct");
            }

            explanationText.innerText = currentQ.explanation;
            explanationBox.style.display = "block";
            nextBtn.style.display = "block";
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showScore();
            }
        }

        function showScore() {
            quizArea.style.display = "none";
            scoreBoard.style.display = "block";
            finalScoreText.innerText = score;
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            scoreBoard.style.display = "none";
            quizArea.style.display = "block";
            loadQuestion();
        }

        loadQuestion();
    </script>
</body>
</html>
