<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Premium IPA SMP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 700px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #2d3748;
            font-size: 28px;
            font-weight: 700;
        }

        .music-player {
            background: #f7fafc;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
            text-align: center;
        }

        .music-player label {
            display: block;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 10px;
        }

        input[type="file"] {
            display: block;
            margin: 0 auto;
            font-size: 14px;
            color: #718096;
        }

        audio {
            width: 100%;
            margin-top: 15px;
            outline: none;
        }

        .question-box {
            margin-bottom: 25px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 15px;
            white-space: pre-line;
        }

        .question-img {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            color: #4a5568;
        }

        .option-btn:hover:not(:disabled) {
            background: #ebf4ff;
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background: #c6f6d5;
            border-color: #48bb78;
            color: #22543d;
        }

        .option-btn.wrong {
            background: #fed7d7;
            border-color: #f56565;
            color: #742a2a;
        }

        .explanation {
            margin-top: 25px;
            padding: 20px;
            background: #fffaf0;
            border-left: 5px solid #ed8936;
            border-radius: 8px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .explanation h3 {
            color: #dd6b20;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .explanation p {
            font-size: 15px;
            line-height: 1.6;
            color: #4a5568;
        }

        .next-btn {
            margin-top: 25px;
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s ease;
            display: none;
        }

        .next-btn:hover {
            background: #5a67d8;
        }

        .score-board {
            text-align: center;
            display: none;
        }

        .score-board h2 {
            font-size: 32px;
            color: #2d3748;
            margin-bottom: 15px;
        }

        .score-board p {
            font-size: 18px;
            color: #718096;
            margin-bottom: 30px;
        }

        .restart-btn {
            background: #48bb78;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .restart-btn:hover {
            background: #38a169;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header" id="header">
            <h1>Quiz IPA Premium</h1>
        </div>

        <div class="music-player" id="music-section">
            <label for="audio-upload">🎵 Tambahkan Musik Latar (Pilih File .mp3):</label>
            <input type="file" id="audio-upload" accept="audio/*">
            <audio id="audio-player" controls loop style="display:none;"></audio>
        </div>

        <div id="quiz-area">
            <div class="question-box">
                <p class="question-text" id="question-text">Memuat pertanyaan...</p>
                <img id="question-img" class="question-img" src="" alt="Gambar Soal">
            </div>
            
            <div class="options" id="options-container">
                </div>

            <div class="explanation" id="explanation-box">
                <h3>👨‍🏫 Pembahasan:</h3>
                <p id="explanation-text"></p>
            </div>

            <button class="next-btn" id="next-btn" onclick="nextQuestion()">Soal Selanjutnya</button>
        </div>

        <div class="score-board" id="score-board">
            <h2>Quiz Selesai! 🎉</h2>
            <p>Skor kamu: <strong id="final-score">0</strong> dari 5</p>
            <button class="restart-btn" onclick="restartQuiz()">Main Lagi</button>
        </div>
    </div>

    <script>
        // Data Soal (Diambil dari foto ujian)
        const questions = [
            {
                question: "Perhatikan beberapa perubahan materi berikut ini!\n1) Lilin meleleh\n2) Pakaian basah yang dijemur\n3) Bensin dibakar\n4) Emas dilebur\n5) Sumbu lilin yang dibakar\n6) Fotosintesis\n\nDari pernyataan tersebut yang merupakan perubahan fisika terdapat pada nomor....",
                image: "", 
                options: ["1, 2 dan 3", "1, 2 dan 4", "3, 5 dan 6", "4, 5 dan 6"],
                answer: 1, // Index 1 adalah "1, 2 dan 4"
                explanation: "Halo! Perubahan fisika itu cuma wujudnya aja yang berubah, tapi sifat zat aslinya tetap sama. Contohnya kayak lilin yang meleleh, baju basah yang jadi kering (air menguap), sama emas yang dilebur. Nah, kalau dibakar atau proses fotosintesis itu udah masuk perubahan kimia karena menghasilkan zat baru ya!"
            },
            {
                question: "Budi merupakan anak dari seorang pedagang keliling. Budi rajin membantu orangtuanya berjualan setelah bersekolah... Kebiasaan Budi yang selalu membawa dagangan yang berat menyebabkan badan Budi membungkuk. Kelainan tulang tersebut yang tepat di bawah ini adalah....",
                image: "",
                options: ["Kifosis", "Lordosis", "Saraf terjepit", "Skoliosis"],
                answer: 0,
                explanation: "Inget rumus cepat ini ya: kalau bungkuk ke depan punggungnya itu namanya Kifosis (ingat huruf 'K' kayak Kakek-kakek bungkuk). Kalau Lordosis itu tulang punggung melengkung ke depan (perut maju), dan kalau Skoliosis itu bentuknya melengkung ke samping huruf 'S'."
            },
            {
                question: "Perhatikan gambar struktur bagian organ berikut ini!\n(Gambar menunjukkan struktur mirip kumpulan anggur di saluran pernapasan)\n\nGambar tersebut merupakan bagian dari organ....",
                image: "https://images.unsplash.com/photo-1599598425947-33002621ec32?auto=format&fit=crop&q=80&w=400", // Placeholder premium, bisa diganti nama file "gambar-paru.jpg"
                options: ["Ginjal", "Hati", "Kulit", "Paru-paru"],
                answer: 3,
                explanation: "Gambar di soal kamu itu nunjukin alveolus, yang bentuknya bulat-bulat kayak anggur. Fungsinya sangat penting sebagai tempat pertukaran gas oksigen (O2) dan karbon dioksida (CO2). Tentu saja tempatnya ada di dalam paru-paru kita, nak!"
            },
            {
                question: "Perhatikan ilustrasi penyakit menular seksual (HIV/AIDS, Sifilis, Herpes, dll). Upaya pencegahan yang dilakukan agar terhindar dari penyakit seperti pada ilustrasi tersebut adalah....",
                image: "",
                options: ["Tidak menggunakan kondom saat berhubungan", "Tidak menghindari obat-obatan terlarang dan alkohol", "Memiliki satu pasangan yang tetap untuk melakukan hubungan seksual", "Tidak membicarakan riwayat penyakit seksual yang dimiliki dengan pasangan"],
                answer: 2,
                explanation: "Cara paling aman, sehat, dan sesuai norma itu ya setia sama satu pasangan yang sah (suami/istri) supaya terhindar dari berbagai penyakit menular seksual. Jangan pernah coba-coba pergaulan bebas ya, sangat berbahaya buat masa depanmu!"
            },
            {
                question: "Pernyataan yang tepat di bawah ini mengenai mekanisme pernapasan dada adalah....",
                image: "",
                options: [
                    "Rongga dada pada saat inspirasi lebih besar dibandingkan pada saat ekspirasi karena otot antar tulang rusuk berelaksasi",
                    "Rongga dada pada saat inspirasi lebih besar dibandingkan pada saat ekspirasi karena otot antar tulang rusuk berkontraksi",
                    "Rongga dada pada saat inspirasi lebih kecil dibandingkan pada saat ekspirasi karena otot antar tulang rusuk berelaksasi",
                    "Rongga dada pada saat inspirasi lebih kecil dibandingkan pada saat ekspirasi karena otot antar tulang rusuk berkontraksi"
                ],
                answer: 1,
                explanation: "Coba deh praktikkan, pas kamu tarik napas (inspirasi), pasti dadamu membesar kan? Nah, itu terjadi karena otot antar tulang rusuk kita lagi kontraksi (bekerja keras menarik tulang), sehingga rongga dadanya mengembang untuk memberi ruang bagi udara masuk."
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let hasAnswered = false;

        // Elemen DOM
        const questionText = document.getElementById("question-text");
        const questionImg = document.getElementById("question-img");
        const optionsContainer = document.getElementById("options-container");
        const explanationBox = document.getElementById("explanation-box");
        const explanationText = document.getElementById("explanation-text");
        const nextBtn = document.getElementById("next-btn");
        const quizArea = document.getElementById("quiz-area");
        const scoreBoard = document.getElementById("score-board");
        const finalScoreText = document.getElementById("final-score");
        const audioUpload = document.getElementById("audio-upload");
        const audioPlayer = document.getElementById("audio-player");

        // Fitur Pemutar Musik
        audioUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                audioPlayer.src = URL.createObjectURL(file);
                audioPlayer.style.display = 'block';
                audioPlayer.play();
            }
        });

        // Muat Pertanyaan
        function loadQuestion() {
            hasAnswered = false;
            explanationBox.style.display = "none";
            nextBtn.style.display = "none";
            optionsContainer.innerHTML = "";

            const currentQ = questions[currentQuestionIndex];
            questionText.innerText = `Soal ${currentQuestionIndex + 1}:\n${currentQ.question}`;

            // Logika gambar
            if (currentQ.image !== "") {
                questionImg.src = currentQ.image;
                questionImg.style.display = "block";
            } else {
                questionImg.style.display = "none";
            }

            // Buat tombol opsi
            currentQ.options.forEach((option, index) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                // Gunakan alfabet A, B, C, D
                const letter = String.fromCharCode(65 + index);
                btn.innerText = `${letter}. ${option}`;
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        // Cek Jawaban
        function checkAnswer(selectedIndex, selectedBtn) {
            if (hasAnswered) return;
            hasAnswered = true;

            const currentQ = questions[currentQuestionIndex];
            const allBtns = optionsContainer.querySelectorAll(".option-btn");

            // Disable semua tombol
            allBtns.forEach(btn => btn.disabled = true);

            // Cek benar/salah
            if (selectedIndex === currentQ.answer) {
                selectedBtn.classList.add("correct");
                score++;
            } else {
                selectedBtn.classList.add("wrong");
                // Tunjukkan yang benar
                allBtns[currentQ.answer].classList.add("correct");
            }

            // Tampilkan penjelasan
            explanationText.innerText = currentQ.explanation;
            explanationBox.style.display = "block";
            
            // Munculkan tombol next
            nextBtn.style.display = "block";
        }

        // Pertanyaan Selanjutnya
        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showScore();
            }
        }

        // Tampilkan Nilai
        function showScore() {
            quizArea.style.display = "none";
            scoreBoard.style.display = "block";
            finalScoreText.innerText = score;
        }

        // Ulangi Quiz
        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            scoreBoard.style.display = "none";
            quizArea.style.display = "block";
            loadQuestion();
        }

        // Mulai Quiz saat halaman dimuat
        loadQuestion();
    </script>
</body>
</html>
