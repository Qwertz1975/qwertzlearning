<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz IPA</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            startup: {
                pageReady: () => {
                    return MathJax.startup.defaultPageReady();
                }
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* Glassmorphism Premium UI */
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        h1 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: -webkit-linear-gradient(#fff, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Music Player Styling */
        .music-section {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
        }

        .custom-file-upload {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
            font-weight: 600;
        }

        .custom-file-upload:hover {
            background: rgba(79, 172, 254, 0.3);
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.4);
            transform: translateY(-2px);
        }

        input[type="file"] { display: none; }
        audio { width: 100%; max-width: 500px; border-radius: 30px; height: 40px; outline: none; }

        /* Quiz UI - 1 Layar 1 Soal */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            width: 0%;
            transition: width 0.4s ease;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 1.1em;
            color: #a1c4fd;
        }

        .question-text {
            font-size: 1.3em;
            margin-bottom: 20px;
            line-height: 1.6;
            font-weight: 600;
        }

        .ai-image {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1em;
            text-align: left;
            transition: all 0.3s ease;
            color: white;
            display: flex;
            align-items: center;
        }

        .option-btn:hover:not(.disabled) {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .option-btn.disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        /* Merah Hijau Feedback */
        .option-btn.correct-ans {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%) !important;
            border-color: #38ef7d !important;
            box-shadow: 0 5px 15px rgba(56, 239, 125, 0.4);
            color: white;
        }

        .option-btn.wrong-ans {
            background: linear-gradient(135deg, #cb2d3e 0%, #ef473a 100%) !important;
            border-color: #ef473a !important;
            box-shadow: 0 5px 15px rgba(239, 71, 58, 0.4);
            color: white;
        }

        /* Explanation Box */
        .explanation-box {
            display: none;
            background: rgba(0, 0, 0, 0.4);
            border-left: 5px solid;
            padding: 25px;
            border-radius: 0 16px 16px 0;
            margin-bottom: 25px;
            font-size: 1em;
            line-height: 1.7;
            animation: slideDown 0.4s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .explanation-box.correct { border-left-color: #38ef7d; }
        .explanation-box.wrong { border-left-color: #ef473a; }

        .physics-format p { margin: 8px 0; }
        .physics-format strong { color: #4facfe; }

        /* Navigation Button */
        .next-btn {
            display: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 30px;
            border-radius: 30px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }

        .next-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(118, 75, 162, 0.6);
        }

        /* Results Screen */
        #result-screen {
            display: none;
            text-align: center;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 5px solid #4facfe;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            font-weight: bold;
            margin: 0 auto 30px auto;
            box-shadow: 0 0 30px rgba(79, 172, 254, 0.5);
            color: #4facfe;
        }

        .restart-btn {
            background: transparent;
            border: 2px solid #4facfe;
            color: #4facfe;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .restart-btn:hover {
            background: #4facfe;
            color: #0f2027;
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <h1>Quiz IPA</h1>
        
        <div class="music-section">
            <label for="musicInput" class="custom-file-upload">
                🎵 Tambah Musik Background
            </label>
            <input type="file" id="musicInput" accept="audio/*">
            <audio id="audioPlayer" controls style="display: none;"></audio>
        </div>

        <div id="quiz-screen">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            
            <div class="question-header">
                <span id="question-number">Soal 1 dari 6</span>
                <span id="score-tracker">Skor: 0</span>
            </div>

            <div id="question-text" class="question-text"></div>
            <img id="question-image" class="ai-image" src="" alt="Gambar AI" style="display: none;">
            
            <div class="options-grid" id="options-container">
                </div>

            <div class="explanation-box" id="explanation-box">
                <h4 style="margin-bottom: 15px; color: white;">📘 Evaluasi & Pembahasan:</h4>
                <div id="explanation-content"></div>
            </div>

            <button class="next-btn" id="next-btn" onclick="nextQuestion()">Soal Selanjutnya</button>
        </div>

        <div id="result-screen">
            <h2>Quiz Selesai!</h2>
            <div class="score-circle" id="final-score">100</div>
            <h3 id="score-message" style="margin-bottom: 30px; color: #a1c4fd;">Luar Biasa!</h3>
            <button class="restart-btn" onclick="location.reload()">Mulai Ulang Quiz</button>
        </div>

    </div>

    <script>
        // Music Player Logic
        document.getElementById('musicInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const url = URL.createObjectURL(file);
                const audio = document.getElementById('audioPlayer');
                audio.src = url;
                audio.style.display = 'block';
                audio.play();
            }
        });

        // Quiz Data with AI Image Prompts (using Pollinations.ai for on-the-fly realistic image generation)
        const questions = [
            {
                text: "Rama melakukan percobaan pengukuran ketebalan uang logam dengan menggunakan micrometer sekrup, dengan hasil seperti gambar berikut!",
                image: "https://image.pollinations.ai/prompt/macro%20photography%20of%20a%20metallic%20micrometer%20screw%20gauge%20measuring%20the%20thickness%20of%20a%20shiny%20coin%20physics%20experiment%20realistic%20high%20quality?width=800&height=400&nologo=true",
                options: ["A. 7,23 mm", "B. 7,73 mm", "C. 8,23 mm", "D. 8,78 mm"],
                correct: 0,
                isPhysics: true,
                explanation: {
                    diketahui: "Skala Utama (SU) = 7,0 mm<br>Skala Nonius (SN) = 23 × 0,01 mm = 0,23 mm",
                    ditanya: "Ketebalan uang logam (Hasil Pengukuran)?",
                    rumus: "$$Hasil = SU + SN$$",
                    jawab: "$$Hasil = 7,0\\text{ mm} + 0,23\\text{ mm} = 7,23\\text{ mm}$$",
                    kesimpulan: "Jadi, ketebalan uang logam yang terukur adalah 7,23 mm."
                }
            },
            {
                text: "Pada sebuah balok terdapat tiga gaya yang bekerja seperti pada gambar tersebut. Jika massa balok 2.500 gr, besar dan arah percepatan balok adalah ....",
                image: "https://image.pollinations.ai/prompt/wooden%20block%20on%20a%20smooth%20surface%20being%20pulled%20by%20ropes%20in%20opposite%20directions%20physics%20force%20diagram%20realistic?width=800&height=400&nologo=true",
                options: ["A. 1,0 m/s² ke kanan", "B. 1,6 m/s² ke kiri", "C. 2,2 m/s² ke kanan", "D. 2,8 m/s² ke kiri"],
                correct: 1,
                isPhysics: true,
                explanation: {
                    diketahui: "$$F_1 = 10\\text{ N (ke kiri)}$$<br>$$F_2 = 14\\text{ N (ke kanan)}$$<br>$$F_3 = 8\\text{ N (ke kiri)}$$<br>$$m = 2.500\\text{ gr} = 2,5\\text{ kg}$$",
                    ditanya: "Besar dan arah percepatan balok ($$a$$)?",
                    rumus: "$$\\Sigma F = m \\cdot a$$",
                    jawab: "$$\\Sigma F = F_2 - (F_1 + F_3)$$<br>$$\\Sigma F = 14 - (10 + 8) = 14 - 18 = -4\\text{ N}$$ (Tanda negatif menunjukkan arah resultan gaya ke kiri).<br>$$a = \\frac{\\Sigma F}{m} = \\frac{4}{2,5} = 1,6\\text{ m/s}^2$$",
                    kesimpulan: "Percepatan balok adalah 1,6 m/s² dengan arah ke kiri."
                }
            },
            {
                text: "Perhatikan gambar berikut! Jika percepatan gravitasi 9,8 m/s², energi potensialnya adalah ...",
                image: "https://image.pollinations.ai/prompt/a%20heavy%20coconut%20falling%20from%20a%20very%20tall%20palm%20tree%20blue%20sky%20physics%20potential%20energy%20realistic%20photo?width=800&height=400&nologo=true",
                options: ["A. 24,5 J", "B. 49,0 J", "C. 245 J", "D. 490 J"],
                correct: 0,
                isPhysics: true,
                explanation: {
                    diketahui: "$$m = 0,5\\text{ kg}$$ (Asumsi massa kelapa standar)<br>$$h = 5\\text{ m}$$ (Asumsi tinggi pohon)<br>$$g = 9,8\\text{ m/s}^2$$",
                    ditanya: "Energi Potensial ($$E_p$$)?",
                    rumus: "$$E_p = m \\cdot g \\cdot h$$",
                    jawab: "$$E_p = 0,5 \\cdot 9,8 \\cdot 5$$<br>$$E_p = 24,5\\text{ Joule}$$",
                    kesimpulan: "Energi potensial kelapa tersebut adalah 24,5 J."
                }
            },
            {
                text: "Perhatikan tuas di bawah ini! Untuk menahan beban 300 N, agar berada pada posisi seimbang, besar gaya F yang harus diberikan adalah ....",
                image: "https://image.pollinations.ai/prompt/physics%20lever%20seesaw%20lifting%20a%20heavy%20metal%20weight%20fulcrum%20in%20the%20middle%20realistic%20diagram?width=800&height=400&nologo=true",
                options: ["A. 50 N", "B. 100 N", "C. 150 N", "D. 200 N"],
                correct: 1,
                isPhysics: true,
                explanation: {
                    diketahui: "Beban ($$W$$) = 300 N<br>Lengan Beban ($$L_w$$) = $$\\frac{1}{2}\\text{ m} = 0,5\\text{ m}$$<br>Lengan Kuasa ($$L_f$$) = $$1\\frac{1}{2}\\text{ m} = 1,5\\text{ m}$$",
                    ditanya: "Gaya Kuasa ($$F$$)?",
                    rumus: "$$W \\cdot L_w = F \\cdot L_f$$",
                    jawab: "$$300 \\cdot 0,5 = F \\cdot 1,5$$<br>$$150 = 1,5 \\cdot F$$<br>$$F = \\frac{150}{1,5} = 100\\text{ N}$$",
                    kesimpulan: "Besar gaya F yang harus diberikan adalah 100 N."
                }
            },
            {
                text: "Perhatikan gambar rangkaian listrik di bawah ini! Jika R₁ = R₂ = 10 Ω dan R₃ = R₄ = 8 Ω, dan V = 12 V. Besar kuat arus yang mengalir pada rangkaian adalah ...",
                image: "https://image.pollinations.ai/prompt/electrical%20circuit%20board%20with%20resistors%20and%20wires%20glowing%20physics%20experiment%20premium%20lighting%20realistic?width=800&height=400&nologo=true",
                options: ["A. 0,5 A", "B. 2,0 A", "C. 36,0 A", "D. 288 A"],
                correct: 0,
                isPhysics: true,
                explanation: {
                    diketahui: "$$R_1 = 10\\ \\Omega,\\ R_2 = 10\\ \\Omega$$ (Seri)<br>$$R_3 = 8\\ \\Omega,\\ R_4 = 8\\ \\Omega$$ (Paralel)<br>$$V = 12\\text{ V}$$",
                    ditanya: "Kuat Arus Total ($$I$$)?",
                    rumus: "$$I = \\frac{V}{R_{total}}$$<br>$$R_p = \\frac{R_3 \\cdot R_4}{R_3 + R_4}$$<br>$$R_s = R_1 + R_2$$",
                    jawab: "Hambatan paralel ($$R_p$$): $$\\frac{1}{R_p} = \\frac{1}{8} + \\frac{1}{8} = \\frac{2}{8} \\implies R_p = 4\\ \\Omega$$<br>Hambatan seri ($$R_s$$): $$R_s = 10 + 10 = 20\\ \\Omega$$<br>Hambatan Total: $$R_{total} = R_s + R_p = 20 + 4 = 24\\ \\Omega$$<br>Kuat Arus: $$I = \\frac{12}{24} = 0,5\\text{ A}$$",
                    kesimpulan: "Besar kuat arus yang mengalir adalah 0,5 A."
                }
            },
            {
                text: "Perhatikan beberapa perubahan materi berikut ini: 1) Lilin meleleh, 2) Pakaian basah yang di jemur, 3) Bensin di bakar, 4) Emas di lebur, 5) Sumbu lilin yang dibakar, 6) Fotosintesis. Dari pernyataan tersebut yang merupakan perubahan fisika terdapat pada nomor....",
                image: "https://image.pollinations.ai/prompt/melting%20wax%20candle%20and%20wet%20clothes%20drying%20physics%20states%20of%20matter%20realistic%20cinematic%20lighting?width=800&height=400&nologo=true",
                options: ["A. 1, 2 dan 3", "B. 1, 2 dan 4", "C. 3, 5 dan 6", "D. 4, 5 dan 6"],
                correct: 1,
                isPhysics: false,
                explanation: {
                    kesimpulan: "Perubahan fisika adalah perubahan materi yang tidak menghasilkan zat baru, melainkan hanya perubahan wujud atau bentuk. <br><br>1) Lilin meleleh (Fisika - wujud padat ke cair)<br>2) Pakaian basah dijemur (Fisika - air menguap)<br>3) Bensin dibakar (Kimia - pembakaran)<br>4) Emas dilebur (Fisika - wujud padat ke cair)<br>5) Sumbu lilin dibakar (Kimia - pembakaran)<br>6) Fotosintesis (Kimia - reaksi pembuatan makanan)<br><br>Jadi jawaban yang tepat adalah 1, 2, dan 4."
                }
            }
        ];

        let currentQIndex = 0;
        let score = 0;
        let answered = false;

        const questionText = document.getElementById('question-text');
        const questionImage = document.getElementById('question-image');
        const optionsContainer = document.getElementById('options-container');
        const explanationBox = document.getElementById('explanation-box');
        const explanationContent = document.getElementById('explanation-content');
        const nextBtn = document.getElementById('next-btn');
        const progressFill = document.getElementById('progress-fill');
        const questionNumber = document.getElementById('question-number');
        const scoreTracker = document.getElementById('score-tracker');

        function loadQuestion() {
            answered = false;
            const q = questions[currentQIndex];
            
            // Update UI headers
            questionNumber.innerText = `Soal ${currentQIndex + 1} dari ${questions.length}`;
            progressFill.style.width = `${((currentQIndex) / questions.length) * 100}%`;
            
            // Load Content
            questionText.innerText = q.text;
            
            if (q.image) {
                questionImage.src = q.image;
                questionImage.style.display = 'block';
            } else {
                questionImage.style.display = 'none';
            }

            // Load Options
            optionsContainer.innerHTML = '';
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.id = `opt-${index}`;
                btn.innerText = opt;
                btn.onclick = () => selectOption(index);
                optionsContainer.appendChild(btn);
            });

            // Reset States
            explanationBox.style.display = 'none';
            explanationBox.className = 'explanation-box';
            nextBtn.style.display = 'none';

            // Re-render math inside the newly loaded text if any
            if(window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        function selectOption(selectedIndex) {
            if (answered) return;
            answered = true;

            const q = questions[currentQIndex];
            const allOptions = document.querySelectorAll('.option-btn');

            // Disable all options
            allOptions.forEach(btn => btn.classList.add('disabled'));

            // Check Answer (Merah / Hijau)
            if (selectedIndex === q.correct) {
                score++;
                document.getElementById(`opt-${selectedIndex}`).classList.add('correct-ans');
                explanationBox.classList.add('correct');
            } else {
                document.getElementById(`opt-${selectedIndex}`).classList.add('wrong-ans');
                document.getElementById(`opt-${q.correct}`).classList.add('correct-ans');
                explanationBox.classList.add('wrong');
            }

            // Update Score Tracker
            scoreTracker.innerText = `Skor: ${score}`;

            // Load Explanation
            let expHTML = '';
            if (q.isPhysics) {
                expHTML = `
                    <div class="physics-format">
                        <p><strong>Diketahui:</strong><br>${q.explanation.diketahui}</p>
                        <p><strong>Ditanya:</strong><br>${q.explanation.ditanya}</p>
                        <p><strong>Jawab:</strong></p>
                        <p><strong>Rumus:</strong><br>${q.explanation.rumus}</p>
                        <p><strong>Jawaban:</strong><br>${q.explanation.jawab}<br><br><strong>${q.explanation.kesimpulan}</strong></p>
                    </div>
                `;
            } else {
                expHTML = `<p>${q.explanation.kesimpulan}</p>`;
            }
            
            explanationContent.innerHTML = expHTML;
            explanationBox.style.display = 'block';

            // Show Next Button
            if (currentQIndex === questions.length - 1) {
                nextBtn.innerText = "Lihat Hasil Akhir";
            } else {
                nextBtn.innerText = "Soal Selanjutnya";
            }
            nextBtn.style.display = 'block';

            // Re-render math in explanation
            if(window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        function nextQuestion() {
            currentQIndex++;
            if (currentQIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            const finalScore = Math.round((score / questions.length) * 100);
            document.getElementById('final-score').innerText = finalScore;
            
            const msg = document.getElementById('score-message');
            if (finalScore === 100) {
                msg.innerText = "Sempurna! Kamu sangat menguasai materi ini.";
            } else if (finalScore >= 70) {
                msg.innerText = "Bagus! Pemahamanmu sudah cukup baik.";
            } else {
                msg.innerText = "Tetap Semangat! Yuk pelajari lagi pembahasannya.";
            }
            msg.style.color = finalScore >= 70 ? '#38ef7d' : '#ef473a';
            document.querySelector('.score-circle').style.borderColor = finalScore >= 70 ? '#38ef7d' : '#ef473a';
            document.querySelector('.score-circle').style.color = finalScore >= 70 ? '#38ef7d' : '#ef473a';
        }

        // Initialize first question
        window.onload = loadQuestion;
    </script>
</body>
</html>
