            "Text 3": "Text 3: Cats\nCats are the most popular pet in the world. The domestication of cats is believed to have started in ancient Egypt 9,500 years ago. Cats are known as solitary hunters, but they are also a social species. They can make various sounds such as mewing, purring, hissing, and growling to communicate. Their eyes allow them to see in the dark, and they have sharp claws which can be retracted. Nowadays, they are favored by millions of people globally.",

            { id: 15, soal: "\"He then ripped off Duck's neck muscles quickly using his sharp beak.\" The passive voice of this sentence is:", pilihan: ["Duck's neck muscles were ripped off quickly by him using his sharp beak.", "Duck's neck muscles are ripped off quickly by him using his sharp beak.", "Duck's neck muscles had been ripped off quickly by him using his sharp beak.", "Duck's neck muscles was ripped off quickly by him using his sharp beak."], jawaban: 0, pembahasan: "Muscles (plural) + V2 -> 'were ripped off'." },

            { id: 18, soal: "Eagle said in a loud voice, 'Shut up! I’m not going to kill you!' The correct indirect speech is:", pilihan: ["Eagle shouted and ordered him to shut up, adding that he was not going to kill him.", "Eagle shouted to shut up and he is not going to kill him.", "Eagle said in a loud voice that he shut up and he didn't kill him.", "Eagle ordered him to shut up and said that I am not going to kill you."], jawaban: 0, pembahasan: "Reporting verbs yang tepat adalah 'ordered' dan penyesuaian pronoun 'he' dan 'him'." },

            { id: 21, textRef: "Text 5", soal: "Based on Text 5, how do Komodo dragons subdue prey that is larger than them, like a water buffalo?", pilihan: ["By relying strictly on their massive 135 kg weight to crush the prey immediately.", "By poisoning the blood of the prey using venom produced in their mouths and tracking it.", "By hunting in large packs like the wolves in the forest.", "By confusing the prey with their yellowish forked tongue."], jawaban: 1, pembahasan: "Komodo menggunakan bisa (venom) dan mengikuti mangsanya sampai lemas." },

            { id: 23, soal: "\"The species has become endangered and is currently protected by law.\" The active equivalent for the second clause is:", pilihan: ["Law is currently protecting the species.", "The government currently protects the species by law.", "Law has currently protected the species.", "Law protected the species currently."], jawaban: 1, pembahasan: "Subjek (law/government) + present tense (protects) karena 'is protected' adalah passive present." },
            { id: 24, soal: "By the time the scientist arrived at the Lesser Sunda Islands, the female Komodo ______ her eggs in the deep burrow.", pilihan: ["already laid", "has already laid", "had already laid", "was already laying"], jawaban: 2, pembahasan: "Past Perfect (had already laid) karena bertelur dilakukan sebelum ilmuwan datang." },

            { id: 27, soal: "If the younger brother is still selling fruits today, which sentence is correct?", pilihan: ["He has been making his living by selling star fruits.", "He had been making his living by selling star fruits.", "He is making his living by selling star fruits since he was young.", "He will have been making his living by selling star fruits."], jawaban: 0, pembahasan: "Present Perfect Continuous (has been making) untuk aksi yang mulai di masa lalu dan masih berlanjut." },

            { id: 35, soal: "My brother said, \"I cannot wait until we can visit the beach again.\" In indirect speech:", pilihan: ["My brother said that he could not wait until they could visit the beach again.", "My brother said that I cannot wait until we can visit the beach again.", "My brother said if he could not wait until they could visit the beach again.", "My brother said that he cannot wait until they could visit the beach again."], jawaban: 0, pembahasan: "Can -> Could, pronouns I -> he, we -> they." },
            { id: 36, soal: "Fill in the blanks based on the vocabulary list: \"His relentless ______ in studying finally ______ when he was accepted into his dream university.\"", pilihan: ["goal; achievement", "perseverance; paid off", "intention; pursuing", "accomplishment; intention"], jawaban: 1, pembahasan: "Perseverance (kegigihan) dan paid off (terbayar)." },
            { id: 37, soal: "Winning the international debate competition was her greatest ______, fulfilling a ______ she had been pursuing for years.", pilihan: ["accomplishment; goal", "perseverance; paid off", "intention; goal", "goal; accomplishment"], jawaban: 0, pembahasan: "Accomplishment (prestasi) dan goal (tujuan)." },
            { id: 38, soal: "Which of the following sentences correctly utilizes the Past Perfect tense to describe a completed action before another past action?", pilihan: ["I had been driving my car when the tire blew out.", "She had driven her car to the garage before the rain started.", "They have driven for three hours to reach the destination.", "He had drove his car yesterday."], jawaban: 1, pembahasan: "Pola Past Perfect: Had + V3 (driven) sebelum kejadian lampau lain (rain started)." },
            { id: 39, soal: "\"I have been playing for two hours.\" What does this sentence logically imply?", pilihan: ["The playing finished two hours ago permanently.", "The playing started in the past and has just finished or is still continuing now.", "The playing will start in two hours.", "The playing had finished before another action started."], jawaban: 1, pembahasan: "Present Perfect Continuous berfokus pada durasi yang masih berlangsung atau baru saja selesai." },
            { id: 40, soal: "By 10:00 PM tonight, the mechanic ______ the engine for 8 hours straight.", pilihan: ["will have repaired", "will be repairing", "will have been repairing", "has been repairing"], jawaban: 2, pembahasan: "Future Perfect Continuous (will have been repairing) karena menunjukkan durasi sampai waktu tertentu di masa depan." },
            { id: 41, soal: "Identify the correct form: Why were his hands so dirty? Because he ______ in the garden all morning.", pilihan: ["has been working", "had been working", "was working", "had worked"], jawaban: 1, pembahasan: "Past Perfect Continuous (had been working) menjelaskan alasan/kondisi di masa lampau." },
            { id: 42, soal: "Active: \"The committee had been reviewing the documents for a week before they announced the decision.\"\nPassive: \"The documents ______ by the committee for a week before the decision was announced.\"", pilihan: ["had been being reviewed", "had been reviewed", "have been reviewed", "were being reviewed"], jawaban: 0, pembahasan: "Passive Past Perfect Continuous: had been + being + V3." },

            { id: 45, soal: "In 2030, my parents ______ married for exactly 30 years.", pilihan: ["will have been", "will have been being", "will be", "have been"], jawaban: 0, pembahasan: "Future Perfect (will have been) menyatakan keadaan yang akan selesai/mencapai titik tertentu di masa depan." },

            { id: 49, soal: "\"When I retire next year, I ______ English for 35 years.\" This means the teaching action is ongoing now and will reach a 35-year milestone next year.", pilihan: ["will be teaching", "will have taught", "will have been teaching", "have been teaching"], jawaban: 2, pembahasan: "Future Perfect Continuous untuk durasi sampai masa depan." },

        function QuizEnglishUS() {
            const [phase, setPhase] = useState("home"); 
            const [current, setCurrent] = useState(0);
            const [selected, setSelected] = useState(null);
            const [answers, setAnswers] = useState({});
            const [showPembahasan, setShowPembahasan] = useState(false);
            const [shuffledQuestions, setShuffledQuestions] = useState([]);
            const [reviewMode, setReviewMode] = useState(false);
            const [reviewIdx, setReviewIdx] = useState(0);

            // Fungsi Acak Soal
            const shuffleArray = (array) => {
                let shuffled = [...array];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            };

            const q = shuffledQuestions[current];

            const handleSelect = (i) => {
                if (selected !== null) return;
                setSelected(i);
                setAnswers(prev => ({ ...prev, [current]: i }));
                setShowPembahasan(true);
            };

            const next = () => {
                setSelected(null);
                setShowPembahasan(false);
                if (current < shuffledQuestions.length - 1) { setCurrent(c => c + 1); }
                else { setPhase("result"); }
            };

            const prev = () => {
                if (current > 0) {
                    setSelected(answers[current - 1] ?? null);
                    setShowPembahasan(answers[current - 1] !== undefined);
                    setCurrent(c => c - 1);
                }
            };

            const startQuiz = () => {
                setShuffledQuestions(shuffleArray(QUESTIONS));
                setCurrent(0); setSelected(null); setAnswers({}); setShowPembahasan(false); setPhase("quiz");
            };

            const score = Object.entries(answers).filter(([idx, ans]) => shuffledQuestions[parseInt(idx)].jawaban === ans).length;
            const pct = Math.round((score / QUESTIONS.length) * 100);

            const grade = pct >= 90 ? { label: "Excellent! 🏆", color: "#6366f1" }
                : pct >= 80 ? { label: "Great Job! ⭐", color: "#10b981" }
                : pct >= 70 ? { label: "Good! 👍", color: "#3b82f6" }
                : { label: "Keep Learning! 📚", color: "#ef4444" };

            // === HOME ===
            if (phase === "home") return (
                <div style={{ minHeight: "100vh", background: "linear-gradient(135deg,#0a0a16 0%,#1e1b4b 100%)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "40px 20px", fontFamily: "system-ui, -apple-system, sans-serif" }}>
                    <div style={{ textAlign: "center", maxWidth: 600 }}>
                        <div style={{ fontSize: 80, marginBottom: 20 }}>🇬🇧</div>
                        <h1 style={{ fontSize: "clamp(32px, 8vw, 56px)", fontWeight: 800, color: "#fff", margin: 0, letterSpacing: "-1px" }}>
                            English Final Exam
                        </h1>
                        <p style={{ color: "rgba(255,255,255,0.6)", fontSize: 18, marginTop: 10, marginBottom: 40 }}>
                            50 Questions • Grammar, Tenses & Reading Comprehension
                        </p>
                        <button onClick={startQuiz} style={{ background: "#4f46e5", border: "none", borderRadius: 16, color: "#fff", padding: "20px 60px", fontSize: 20, fontWeight: 700, cursor: "pointer", transition: "0.3s", boxShadow: "0 10px 25px rgba(79,70,229,0.4)" }}>
                            Start Quiz Now →
                        </button>
                    </div>
                </div>
            );

            // === QUIZ ===
            if (phase === "quiz") {
                const prog = ((current + 1) / shuffledQuestions.length) * 100;
                const readingText = q.textRef ? TEXTS[q.textRef] : null;

                return (
                    <div style={{ minHeight: "100vh", background: "#0a0a16", color: "#fff", padding: "24px 16px 120px", fontFamily: "system-ui, sans-serif" }}>
                        <div style={{ maxWidth: 800, margin: "0 auto" }}>
                            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12, fontSize: 14, color: "rgba(255,255,255,0.5)" }}>
                                <span>Question {current + 1} of 50</span>
                                <span>{Math.round(prog)}% Completed</span>
                            </div>
                            <div style={{ background: "rgba(255,255,255,0.1)", height: 8, borderRadius: 10, marginBottom: 30, overflow: "hidden" }}>
                                <div style={{ width: `${prog}%`, height: "100%", background: "#4f46e5", transition: "0.3s" }} />
                            </div>

                            {readingText && (
                                <div style={{ background: "rgba(79,70,229,0.1)", border: "1px solid rgba(79,70,229,0.3)", borderRadius: 16, padding: 20, marginBottom: 20 }}>
                                    <div style={{ color: "#818cf8", fontWeight: 700, fontSize: 12, marginBottom: 8 }}>📖 READING TEXT</div>
                                    <p style={{ fontSize: 15, lineHeight: 1.6, margin: 0, color: "rgba(255,255,255,0.9)", whiteSpace: "pre-line" }}>{readingText}</p>
                                </div>
                            )}

                            <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 24, padding: "32px" }}>
                                <p style={{ fontSize: 20, lineHeight: 1.5, marginBottom: 30, fontWeight: 500 }}>{q.soal}</p>
                                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                                    {q.pilihan.map((p, i) => {
                                        const isCorrect = i === q.jawaban;
                                        const isSelected = selected === i;
                                        const revealed = selected !== null;
                                        let bg = "rgba(255,255,255,0.05)";
                                        let border = "1px solid rgba(255,255,255,0.1)";
                                        if (revealed) {
                                            if (isCorrect) { bg = "rgba(16,185,129,0.1)"; border = "1px solid #10b981"; }
                                            else if (isSelected) { bg = "rgba(239,68,68,0.1)"; border = "1px solid #ef4444"; }
                                        }
                                        return (
                                            <button key={i} onClick={() => handleSelect(i)} disabled={revealed}
                                                style={{ textAlign: "left", background: bg, border, borderRadius: 16, padding: "16px 20px", color: "#fff", cursor: revealed ? "default" : "pointer", display: "flex", alignItems: "center", gap: 15, fontSize: 16 }}>
                                                <span style={{ width: 30, height: 30, borderRadius: "50%", background: revealed && isCorrect ? "#10b981" : "rgba(255,255,255,0.1)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700 }}>
                                                    {revealed && isCorrect ? "✓" : String.fromCharCode(65 + i)}
                                                </span>
                                                {p}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            {showPembahasan && (
                                <div style={{ marginTop: 20, background: "rgba(245,158,11,0.1)", border: "1px solid rgba(245,158,11,0.3)", borderRadius: 16, padding: 20 }}>
                                    <div style={{ color: "#f59e0b", fontWeight: 700, fontSize: 13, marginBottom: 5 }}>EXPLANATION</div>
                                    <p style={{ margin: 0, fontSize: 14, color: "rgba(255,255,255,0.8)" }}>{q.pembahasan}</p>
                                </div>
                            )}

                            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 30 }}>
                                <button onClick={prev} disabled={current === 0} style={{ padding: "12px 24px", borderRadius: 12, border: "1px solid #333", background: "none", color: "#fff", cursor: "pointer" }}>Back</button>
                                {selected !== null && (
                                    <button onClick={next} style={{ padding: "12px 40px", borderRadius: 12, border: "none", background: "#4f46e5", color: "#fff", fontWeight: 700, cursor: "pointer" }}>
                                        {current === shuffledQuestions.length - 1 ? "Show Result" : "Next Question"}
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            // === RESULT ===
            if (phase === "result") {
                return (
                    <div style={{ minHeight: "100vh", background: "#0a0a16", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", padding: 20, fontFamily: "sans-serif" }}>
                        <div style={{ maxWidth: 500, width: "100%", textAlign: "center" }}>
                            <h2 style={{ fontSize: 32, marginBottom: 10 }}>Quiz Completed!</h2>
                            <div style={{ fontSize: 80, fontWeight: 900, color: grade.color, marginBottom: 10 }}>{pct}%</div>
                            <h3 style={{ fontSize: 24, color: grade.color, marginBottom: 5 }}>{grade.label}</h3>
                            <p style={{ color: "rgba(255,255,255,0.5)", marginBottom: 40 }}>You got {score} out of 50 correct.</p>
                            
                            <button onClick={startQuiz} style={{ width: "100%", padding: "18px", borderRadius: 16, border: "none", background: "#4f46e5", color: "#fff", fontWeight: 700, fontSize: 18, cursor: "pointer" }}>
                                Try Again
                            </button>
                            <button onClick={() => setPhase("home")} style={{ width: "100%", marginTop: 12, padding: "18px", borderRadius: 16, border: "1px solid #333", background: "none", color: "#fff", fontWeight: 600, fontSize: 16, cursor: "pointer" }}>
                                Back to Home
                            </button>
                        </div>
                    </div>
                );
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<QuizEnglishUS />);
    </script>
</body>
</html>
