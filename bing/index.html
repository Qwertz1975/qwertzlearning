<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced English Exam - MehanGG</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background: #0d0d1a;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0d0d1a; }
        ::-webkit-scrollbar-thumb { background: #e85d26; border-radius: 4px; }
        pre { font-family: inherit; white-space: pre-wrap; margin: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const QUESTIONS = [
            // ===== GRAMMAR & TENSES (ADVANCED) =====
            {
                id: 1, kelas: 9, topik: "Future Perfect Continuous",
                soal: "Study the timeline and context carefully:\nThe rescue team started digging the rubble at 6:00 AM. It is now 12:00 PM, and they are still digging. If they continue without stopping until 4:00 PM tomorrow, they ______ for 34 hours straight.",
                pilihan: [
                    "will be digging",
                    "will have dug",
                    "will have been digging",
                    "would have been digging"
                ],
                jawaban: 2,
                pembahasan: "Kalimat ini mengindikasikan suatu kejadian yang akan terus berlangsung dan mencapai durasi tertentu (34 jam) di masa depan (tomorrow). Rumusnya adalah Future Perfect Continuous: S + will have + been + V-ing."
            },
            {
                id: 2, kelas: 9, topik: "Past Perfect vs Past Perfect Continuous",
                soal: "Before the Eagle finally decided to rip the Duck's vocal cords to stop his lies, the Duck ______ the whole forest's inhabitants for several weeks.",
                pilihan: [
                    "had been deceiving",
                    "has been deceiving",
                    "had deceived",
                    "was deceiving"
                ],
                jawaban: 0,
                pembahasan: "Konteks kalimat adalah masa lampau ('decided to rip'). Tindakan menipu (deceive) sudah dimulai dan terus berlangsung hingga titik di masa lampau tersebut. Oleh karena itu, kita menggunakan Past Perfect Continuous (had been V-ing)."
            },
            {
                id: 3, kelas: 8, topik: "Present Perfect Continuous",
                soal: "A zoologist is observing a Komodo dragon. He notes:\n'Look! The dragon's mouth is dripping with venom. It ______ its prey for the last two hours, and it is still waiting for the prey to die.'",
                pilihan: [
                    "has been tracking",
                    "had been tracking",
                    "is tracking",
                    "tracks"
                ],
                jawaban: 0,
                pembahasan: "Karena zoologist masih mengobservasi di masa sekarang ('is dripping', 'is still waiting') dan kejadian tersebut dimulai dari masa lalu hingga saat ini (for the last two hours), tense yang tepat adalah Present Perfect Continuous (has been tracking)."
            },
            {
                id: 4, kelas: 9, topik: "Passive Voice (Tricky)",
                [span_2](start_span)soal: "Change this active sentence into the correct passive voice:\n'The raven told the older brother to bring a long bag.'[span_2](end_span)",
                pilihan: [
                    "A long bag was told to bring by the raven.",
                    "The older brother was told to bring a long bag by the raven.",
                    "The older brother had been told by the raven to bring a long bag.",
                    "The raven was told by the older brother to bring a long bag."
                ],
                jawaban: 1,
                pembahasan: "Objek dari kalimat aktif adalah 'the older brother'. Maka objek tersebut maju menjadi subjek di kalimat pasif. Tense aktifnya adalah Simple Past ('told'), maka pasifnya menjadi 'was told'."
            },
            {
                id: 5, kelas: 9, topik: "Direct to Indirect Speech",
                soal: "Read the excerpt from the fable:\nMr. [span_3](start_span)Duck then cried, “Forgive me, please forgive me. Eagle, you are an intelligent and good animal, please do not let them kill me…”[span_3](end_span)\n\nWhich of the following is the most accurate indirect speech conversion?",
                pilihan: [
                    "Mr. Duck cried and begged the Eagle to forgive him, complimenting his intelligence, and pleaded not to let them kill him.",
                    "Mr. Duck cried and said to the Eagle that he is intelligent and please do not kill me.",
                    "Mr. Duck begged the Eagle that he was forgiven and not let them kill him.",
                    "Mr. Duck told the Eagle to forgive him and said that he had been an intelligent animal."
                ],
                jawaban: 0,
                pembahasan: "Perubahan kalimat imperatif ('Forgive me', 'please do not let') dalam reported speech menggunakan 'to infinitive' (to forgive) dan 'not to infinitive' (not to let). Jawaban A adalah parafrase yang paling akurat secara gramatikal."
            },

            // ===== READING COMPREHENSION (HOTS) =====
            {
                id: 6, kelas: 7, topik: "Text Analysis - Dolphins",
                soal: "Read the excerpt:\n'Although the dolphins have 100 teeth, they don't use their teeth to eat. They use it to get fish then they swallow the fish. [span_4](start_span)They can consume fish up to 15 kg per day.'[span_4](end_span)\n\nBased on the excerpt, what is the exact biological function of the dolphins' dentition?",
                pilihan: [
                    "To thoroughly masticate their prey to aid their sensitive digestive system.",
                    "To actively filter water and extract small aquatic organisms.",
                    "To grip, capture, and secure the fish before ingesting them whole.",
                    "To defend their pods against larger predatory species."
                ],
                jawaban: 2,
                [span_5](start_span)pembahasan: "Kata kunci 'use it to get fish then they swallow'[span_5](end_span) berarti gigi tidak dipakai mengunyah (masticate), melainkan hanya untuk menangkap (capture) dan menahan (secure) ikan sebelum ditelan bulat-bulat."
            },
            {
                id: 7, kelas: 8, topik: "Inference - The Three Little Pigs",
                soal: "Read the excerpt:\n'Now, the two pigs felt sorry for being so lazy while building the houses. [span_6](start_span)They also built their houses with bricks and all the three little pigs lived happily ever after.'[span_6](end_span)\n\nWhat is the underlying motivation for the two younger pigs to finally reconstruct their homes using bricks?",
                pilihan: [
                    "Because they wanted to emulate the aesthetic of their older brother's house.",
                    "Because a profound realization of their lethal laziness prompted a change in their work ethic.",
                    "Because the wolf explicitly ordered them to do so before he perished.",
                    "Because straw and sticks were no longer available in the woods."
                ],
                jawaban: 1,
                [span_7](start_span)pembahasan: "Frasa 'felt sorry for being so lazy'[span_7](end_span) membuktikan bahwa penyesalan terdalam atas kemalasan mereka (yang hampir membunuh mereka) adalah motivasi utama untuk berubah dan bekerja keras menggunakan bata."
            },
            {
                id: 8, kelas: 9, topik: "Vocabulary & Inference - Cats",
                [span_8](start_span)soal: "Read the excerpt:\n'The domestication of cats is believed to have started since ancient Egypt 9,500 years ago... They are a good solitary hunters who have a really good sense of smell... They are a social species...'[span_8](end_span)\n\nWhich statement is NOT a valid conclusion drawn from the text?",
                pilihan: [
                    "Felines have been living alongside humans for nearly a millennium.",
                    "Despite hunting independently, cats are fundamentally capable of social interactions.",
                    "Their olfactory senses are highly developed.",
                    "The integration of cats into human society dates back to antiquity."
                ],
                jawaban: 0,
                pembahasan: "Opsi A salah (sehingga menjadi jawaban yang benar untuk 'NOT'). [span_9](start_span)9.500 tahun[span_9](end_span) hampir mencapai satu dekade milenium (1 milenium = 1.000 tahun), bukan 'nearly a millennium' (hampir 1.000 tahun). Ini adalah pengecoh numerik yang sangat menjebak."
            },
            {
                id: 9, kelas: 9, topik: "Cause and Effect - Eagle & Duck",
                [span_10](start_span)[span_11](start_span)[span_12](start_span)soal: "Read the text excerpt:\n'Because of this, Mr. Duck felt anxious, he then shouted and re-appealed to Eagle... Eagle then ripped off Duck’s neck muscles quickly using his sharp beak... He cannot speak and only had a sound, “quack, quack, quack!”'[span_10](end_span)[span_11](end_span)[span_12](end_span)\n\nWhy did the Eagle specifically target the Duck's neck muscles/cords instead of executing him as the other animals agreed?",
                pilihan: [
                    "To demonstrate his dominance and physical superiority over the deer and weasel.",
                    "To neutralize the Duck's ability to propagate deceit without committing the ultimate sin of murder.",
                    "Because the Eagle missed his attack when plunging from the sky.",
                    "Because the Duck requested a lighter punishment rather than death."
                ],
                jawaban: 1,
                [span_13](start_span)pembahasan: "Elang menyuruh hewan bersabar dan tidak mengambil jalan pembunuhan (do not take murder as the solution)[span_13](end_span). [span_14](start_span)Dia merobek pita suara bebek agar bebek tidak bisa bicara/berbohong lagi (He could no longer told lies)[span_14](end_span), menghilangkan akar masalah tanpa membunuh."
            },
            {
                id: 10, kelas: 8, topik: "Detailed Inference - Star Fruit Tale",
                soal: "Read the excerpt:\n'He was greedy so asked his wife to make a much longer bag. [span_15](start_span)Because the load became too heavy for the raven, it swayed, and the greedy brother fell straight down to the sea with his bag and pockets full of gold.'[span_15](end_span)\n\nWhat was the ultimate catalyst for the older brother's demise?",
                pilihan: [
                    "The raven's malicious intent to drop him over the ocean.",
                    "The sudden change of weather that made the raven sway.",
                    "His inherent avarice which resulted in a critical aerodynamic failure for the bird.",
                    "His wife's inability to sew a bag with strong enough material."
                ],
                jawaban: 2,
                [span_16](start_span)pembahasan: "Kematian sang kakak mutlak disebabkan oleh keserakahannya ('avarice/greediness') yang membuatnya membawa beban terlalu berat, sehingga gagak kehilangan keseimbangan ('swayed')[span_16](end_span)."
            },
            {
                id: 11, kelas: 7, topik: "Reading Comprehension - Parangtritis",
                soal: "Read the excerpt:\n'We packed up our belongings as the sky grew dark. [span_17](start_span)Even though I was physically exhausted, I felt incredibly happy.'[span_17](end_span)\n\nWhat does the writer imply about the trip?",
                pilihan: [
                    "The physical toll significantly ruined the overall experience of the sunset.",
                    "The emotional gratification entirely compensated for the physical fatigue.",
                    "They had to leave early because building the moat consumed too much energy.",
                    "The writer regretted not bringing more homemade sandwiches."
                ],
                jawaban: 1,
                [span_18](start_span)pembahasan: "Kata 'Even though... I felt incredibly happy'[span_18](end_span) bermakna bahwa rasa lelah fisik tidak seberapa dibandingkan dengan kebahagiaan emosional yang ia dapatkan (emotional gratification compensated the fatigue)."
            },
            {
                id: 12, kelas: 9, topik: "Fact Checking - Komodo Dragon",
                [span_19](start_span)soal: "Based on the text about the Komodo dragon, identify the statement that contradicts the provided facts:\n[Text Fact: 'Female Komodo dragons lay eggs in deep burrows... They live in trees for several months to avoid being eaten by the adults.'][span_19](end_span)",
                pilihan: [
                    "The Komodo dragon's saliva contains venom to weaken its prey.",
                    "Juvenile dragons exhibit arboreal behavior primarily as a survival mechanism against cannibalism.",
                    "They possess a yellowish forked tongue which they use to interpret their surroundings.",
                    "Adult Komodo dragons incubate their eggs in tree hollows to protect them from terrestrial predators."
                ],
                jawaban: 3,
                pembahasan: "Pernyataan D salah total. [span_20](start_span)Teks menyatakan betina bertelur di lubang yang dalam di tanah ('deep burrows')[span_20](end_span), bukan di rongga pohon. Anak komodo-lah yang tinggal di pohon untuk menghindari dimakan komodo dewasa."
            },
            {
                id: 13, kelas: 9, topik: "Vocabulary in Context",
                [span_21](start_span)soal: "In the Kisi-kisi, there is a vocabulary list including 'perseverance', 'paid off', and 'accomplishment'.[span_21](end_span) \nWhich of the following sentences utilizes the phrase 'paid off' accurately in a grammatical and contextual sense?",
                pilihan: [
                    "He paid off the cashier with accomplishment after buying the groceries.",
                    "Her years of extreme perseverance and sleepless nights finally paid off when she won the international championship.",
                    "The intention was to paid off the debt, but he failed.",
                    "They paid off the goal pursuing to achieve success."
                ],
                jawaban: 1,
                pembahasan: "'Paid off' dalam konteks ini adalah idiom yang berarti membuahkan hasil (yielded good results). Opsi B menggunakan idiom tersebut dengan sempurna."
            },
            {
                id: 14, kelas: 9, topik: "Mixed Grammar - Passive & Past Perfect",
                [span_22](start_span)[span_23](start_span)soal: "Combine the ideas using Passive Voice and Past Perfect:\nBefore the Eagle arrived, Mr. Duck had deceived the Deer family.[span_22](end_span)[span_23](end_span)",
                pilihan: [
                    "Before the Eagle arrived, the Deer family had been deceived by Mr. Duck.",
                    "Before the Eagle arrived, the Deer family was deceived by Mr. Duck.",
                    "Before the Eagle arrived, the Deer family has been deceived by Mr. Duck.",
                    "Before the Eagle arrived, Mr. Duck had been deceived by the Deer family."
                ],
                jawaban: 0,
                pembahasan: "Past perfect pasif memiliki rumus: S (Object) + had + been + V3. Karena Deer family adalah korban penipuan, mereka menjadi subjek dalam kalimat pasif (had been deceived)."
            },
            {
                id: 15, kelas: 8, topik: "Analytical Thinking - Eagle & Duck",
                soal: "Read the excerpt:\n'After chatting for a long time, he then asked, “Sir, why do you hate weasel?” Mr. deer replied, “Mr. Duck told us, that the weasel family stole our food...” Eagle then asked again, “Have you checked out more about the news?” [span_24](start_span)Mr. Duck replied, “I did not do it, I believed him, because he is my good friend.”'[span_24](end_span)\n\nNOTE: The original text contains an error in attributing dialogue. Who actually said 'I did not do it, I believed him...'?",
                pilihan: [
                    "Mr. Weasel",
                    "Mr. Duck",
                    "Mr. Deer",
                    "The Eagle"
                ],
                jawaban: 2,
                pembahasan: "Ini adalah soal mengecoh yang membutuhkan nalar tingkat tinggi. Teks asli menulis 'Mr. [span_25](start_span)Duck replied'[span_25](end_span), tetapi secara logika cerita, yang menjawab pertanyaan elang 'Have you checked out...?' adalah Bapak Rusa (Mr. Deer) yang ditipu oleh bebek. Rusa percaya karena bebek temannya."
            }
        ];

        const KELAS_INFO = { 
            7: { color: "#e85d26", label: "Grade 7" }, 
            8: { color: "#1a7a5e", label: "Grade 8" }, 
            9: { color: "#6b3fa0", label: "Grade 9" } 
        };

        function QuizUjianSekolahEnglish() {
            const [phase, setPhase] = useState("home"); 
            const [quizQuestions, setQuizQuestions] = useState([]);
            const [current, setCurrent] = useState(0);
            const [selected, setSelected] = useState(null);
            const [answers, setAnswers] = useState({});
            const [showPembahasan, setShowPembahasan] = useState(false);
            const [music, setMusic] = useState(null);
            const [musicName, setMusicName] = useState("");
            const [playing, setPlaying] = useState(false);
            const [volume, setVolume] = useState(0.5);
            const [reviewMode, setReviewMode] = useState(false);
            const [reviewIdx, setReviewIdx] = useState(0);
            const audioRef = useRef(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                if (audioRef.current) {
                    audioRef.current.volume = volume;
                }
            }, [volume]);

            const handleMusicUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const url = URL.createObjectURL(file);
                setMusic(url);
                setMusicName(file.name);
                setPlaying(false);
            };

            const togglePlay = () => {
                if (!audioRef.current) return;
                if (playing) { audioRef.current.pause(); } else { audioRef.current.play(); }
                setPlaying(!playing);
            };

            const startQuiz = () => {
                // Suffle Questions Logic
                const shuffled = [...QUESTIONS].sort(() => Math.random() - 0.5);
                setQuizQuestions(shuffled);
                setCurrent(0); 
                setSelected(null); 
                setAnswers({}); 
                setShowPembahasan(false); 
                setReviewMode(false);
                setPhase("quiz");
            };

            const handleSelect = (i) => {
                if (selected !== null) return;
                setSelected(i);
                setAnswers(prev => ({ ...prev, [current]: i }));
                setShowPembahasan(true);
            };

            const next = () => {
                setSelected(null);
                setShowPembahasan(false);
                if (current < quizQuestions.length - 1) { setCurrent(c => c + 1); }
                else { setPhase("result"); }
            };

            const prev = () => {
                if (current > 0) {
                    setSelected(answers[current - 1] ?? null);
                    setShowPembahasan(answers[current - 1] !== undefined);
                    setCurrent(c => c - 1);
                }
            };

            const MusicPlayer = () => (
                <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "rgba(10,10,20,0.97)", backdropFilter: "blur(16px)", borderTop: "1px solid rgba(255,255,255,0.08)", padding: "10px 24px", display: "flex", alignItems: "center", gap: 16, zIndex: 100 }}>
                    {music && <audio ref={audioRef} src={music} loop onEnded={() => setPlaying(false)} />}
                    <button onClick={() => fileInputRef.current?.click()} style={{ background: "linear-gradient(135deg,#e85d26,#f59e0b)", border: "none", borderRadius: 8, color: "#fff", padding: "7px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap", fontFamily: "inherit" }}>
                        🎵 Upload Musik
                    </button>
                    <input ref={fileInputRef} type="file" accept="audio/*" onChange={handleMusicUpload} style={{ display: "none" }} />
                    {music && (
                        <>
                            <button onClick={togglePlay} style={{ background: playing ? "rgba(232,93,38,0.3)" : "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: "50%", width: 36, height: 36, color: "#fff", cursor: "pointer", fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center" }}>
                                {playing ? "⏸" : "▶"}
                            </button>
                            <span style={{ color: "rgba(255,255,255,0.6)", fontSize: 12, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{musicName}</span>
                            <input type="range" min={0} max={1} step={0.01} value={volume} onChange={e => setVolume(Number(e.target.value))} style={{ width: 80, accentColor: "#e85d26" }} />
                            <span style={{ color: "rgba(255,255,255,0.4)", fontSize: 11 }}>🔊</span>
                        </>
                    )}
                    {!music && <span style={{ color: "rgba(255,255,255,0.35)", fontSize: 12 }}>Upload musik untuk menemanimu mengerjakan quiz ✨</span>}
                </div>
            );

            // === HOME ===
            if (phase === "home") return (
                <div style={{ minHeight: "100vh", background: "linear-gradient(145deg,#0d0d1a 0%,#050a1a 50%,#0a1a1a 100%)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "40px 20px 80px", fontFamily: "'Georgia', serif" }}>
                    <style>{`
                        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;600&display=swap');
                        * { box-sizing: border-box; }
                        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(232,93,38,0.3) !important; }
                        .btn-main:hover { transform: scale(1.03); filter: brightness(1.1); }
                        .opt:hover { background: rgba(255,255,255,0.08) !important; border-color: rgba(255,255,255,0.3) !important; }
                    `}</style>

                    <div style={{ textAlign: "center", maxWidth: 680 }}>
                        <div style={{ fontSize: 64, marginBottom: 8 }}>🇬🇧</div>
                        <h1 style={{ fontFamily: "'Playfair Display', serif", fontSize: "clamp(36px,6vw,64px)", fontWeight: 900, color: "#fff", margin: "0 0 8px", lineHeight: 1.1, letterSpacing: "-1px" }}>
                            Quiz Ujian Sekolah
                            <span style={{ display: "block", background: "linear-gradient(90deg,#e85d26,#f59e0b)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Advanced Mode (HOTS)</span>
                        </h1>
                        <p style={{ color: "rgba(255,255,255,0.55)", fontSize: 16, fontFamily: "'Source Sans 3',sans-serif", marginBottom: 40 }}>Sangat Susah & Mengecoh · Randomized Questions</p>

                        <button className="btn-main" onClick={startQuiz} style={{ background: "linear-gradient(135deg,#e85d26 0%,#f59e0b 100%)", border: "none", borderRadius: 16, color: "#fff", padding: "18px 56px", fontSize: 20, fontWeight: 700, cursor: "pointer", transition: "all 0.25s", fontFamily: "'Playfair Display',serif", letterSpacing: "0.5px", boxShadow: "0 8px 32px rgba(232,93,38,0.4)" }}>
                            Start Hard Quiz →
                        </button>
                    </div>
                    <MusicPlayer />
                </div>
            );

            // === QUIZ ===
            if (phase === "quiz") {
                const q = quizQuestions[current];
                const kinfo = KELAS_INFO[q.kelas];
                const prog = ((current + 1) / quizQuestions.length) * 100;
                const answered = Object.keys(answers).length;

                return (
                    <div style={{ minHeight: "100vh", background: "linear-gradient(160deg,#0d0d1a 0%,#080a1a 60%,#0d100a 100%)", padding: "24px 16px 100px", fontFamily: "'Source Sans 3',Georgia,sans-serif" }}>
                        <div style={{ maxWidth: 720, margin: "0 auto" }}>
                            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                                    <span style={{ background: kinfo.color, color: "#fff", borderRadius: 8, padding: "4px 12px", fontSize: 12, fontWeight: 700 }}>{kinfo.label}</span>
                                    <span style={{ background: "rgba(255,255,255,0.07)", color: "rgba(255,255,255,0.6)", borderRadius: 8, padding: "4px 10px", fontSize: 12 }}>{q.topik}</span>
                                </div>
                                <span style={{ color: "rgba(255,255,255,0.5)", fontSize: 13 }}>{answered}/{quizQuestions.length} answered</span>
                            </div>

                            <div style={{ background: "rgba(255,255,255,0.07)", borderRadius: 99, height: 6, marginBottom: 24 }}>
                                <div style={{ width: `${prog}%`, height: "100%", borderRadius: 99, background: `linear-gradient(90deg,${kinfo.color},#60a5fa)`, transition: "width 0.4s ease" }} />
                            </div>

                            <div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 20, padding: "32px 28px", marginBottom: 16 }}>
                                <div style={{ color: "rgba(255,255,255,0.35)", fontSize: 13, marginBottom: 12, fontWeight: 600, letterSpacing: 1 }}>QUESTION {current + 1} / {quizQuestions.length}</div>
                                <pre style={{ color: "#fff", fontSize: "clamp(15px,2.5vw,17px)", lineHeight: 1.7, margin: "0 0 28px", fontFamily: "'Source Sans 3',serif", whiteSpace: "pre-wrap" }}>{q.soal}</pre>

                                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                                    {q.pilihan.map((p, i) => {
                                        const isCorrect = i === q.jawaban;
                                        const isSelected = selected === i;
                                        const revealed = selected !== null;
                                        let bg = "rgba(255,255,255,0.04)";
                                        let border = "1px solid rgba(255,255,255,0.1)";
                                        let txtColor = "rgba(255,255,255,0.8)";
                                        if (revealed) {
                                            if (isCorrect) { bg = "rgba(16,185,129,0.15)"; border = "1px solid #10b981"; txtColor = "#6ee7b7"; }
                                            else if (isSelected) { bg = "rgba(239,68,68,0.15)"; border = "1px solid #ef4444"; txtColor = "#fca5a5"; }
                                        }
                                        return (
                                            <div key={i} className={revealed ? "" : "opt"} onClick={() => handleSelect(i)}
                                                style={{ background: bg, border, borderRadius: 12, padding: "14px 18px", display: "flex", alignItems: "flex-start", gap: 12, cursor: revealed ? "default" : "pointer" }}>
                                                <span style={{ minWidth: 28, height: 28, borderRadius: "50%", background: revealed && isCorrect ? "#10b981" : revealed && isSelected ? "#ef4444" : "rgba(255,255,255,0.1)", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, flexShrink: 0 }}>
                                                    {revealed && isCorrect ? "✓" : revealed && isSelected && !isCorrect ? "✗" : String.fromCharCode(65 + i)}
                                                </span>
                                                <span style={{ color: txtColor, fontSize: 15, lineHeight: 1.5, paddingTop: 2 }}>{p}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {showPembahasan && (
                                <div style={{ background: "rgba(59,130,246,0.08)", border: "1px solid rgba(59,130,246,0.25)", borderRadius: 16, padding: "20px 22px", marginBottom: 16 }}>
                                    <div style={{ color: "#60a5fa", fontWeight: 700, fontSize: 13, marginBottom: 8, letterSpacing: 0.5 }}>💡 EXPLANATION</div>
                                    <p style={{ color: "rgba(255,255,255,0.8)", fontSize: 14, lineHeight: 1.7, margin: 0 }}>{q.pembahasan}</p>
                                </div>
                            )}

                            <div style={{ display: "flex", gap: 12, justifyContent: "space-between" }}>
                                <button className="btn-nav" onClick={prev} disabled={current === 0}
                                    style={{ background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 12, color: current === 0 ? "rgba(255,255,255,0.2)" : "#fff", padding: "13px 24px", fontSize: 15, fontWeight: 600, cursor: current === 0 ? "not-allowed" : "pointer", transition: "all 0.2s", fontFamily: "inherit" }}>
                                    ← Previous
                                </button>
                                {selected !== null && (
                                    <button className="btn-nav" onClick={next}
                                        style={{ background: current === quizQuestions.length - 1 ? "linear-gradient(135deg,#6b3fa0,#3b82f6)" : "linear-gradient(135deg,#3b82f6,#60a5fa)", border: "none", borderRadius: 12, color: "#fff", padding: "13px 28px", fontSize: 15, fontWeight: 700, cursor: "pointer", transition: "all 0.2s", fontFamily: "inherit", boxShadow: "0 4px 20px rgba(59,130,246,0.3)" }}>
                                        {current === quizQuestions.length - 1 ? "🏁 Show Results" : "Next →"}
                                    </button>
                                )}
                            </div>
                        </div>
                        <MusicPlayer />
                    </div>
                );
            }

            // === RESULT ===
            if (phase === "result") {
                const score = Object.entries(answers).filter(([idx, ans]) => quizQuestions[parseInt(idx)].jawaban === ans).length;
                const pct = Math.round((score / quizQuestions.length) * 100);

                const grade = pct >= 90 ? { label: "Exceptional 🏆", color: "#f59e0b" }
                    : pct >= 80 ? { label: "Excellent ✨", color: "#10b981" }
                    : pct >= 60 ? { label: "Good 👍", color: "#3b82f6" }
                    : { label: "Needs Review ✍️", color: "#ef4444" };

                if (reviewMode) {
                    const reviewQ = quizQuestions[reviewIdx];
                    const kinfo = KELAS_INFO[reviewQ.kelas];
                    const userAns = answers[reviewIdx];
                    const isCorrect = userAns === reviewQ.jawaban;
                    return (
                        <div style={{ minHeight: "100vh", background: "linear-gradient(160deg,#0d0d1a,#0d081a)", padding: "24px 16px 100px", fontFamily: "'Source Sans 3',sans-serif" }}>
                            <div style={{ maxWidth: 720, margin: "0 auto" }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
                                    <button onClick={() => setReviewMode(false)} style={{ background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 10, color: "#fff", padding: "8px 16px", cursor: "pointer", fontSize: 14, fontFamily: "inherit" }}>← Back</button>
                                    <span style={{ color: "rgba(255,255,255,0.5)", fontSize: 14 }}>Review Question {reviewIdx + 1} / {quizQuestions.length}</span>
                                </div>

                                <div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 20, padding: "28px", marginBottom: 16 }}>
                                    <pre style={{ color: "#fff", fontSize: 17, lineHeight: 1.7, fontFamily: "'Source Sans 3',serif", marginBottom: 24, whiteSpace: "pre-wrap" }}>{reviewQ.soal}</pre>
                                    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                                        {reviewQ.pilihan.map((p, i) => {
                                            const isAns = i === reviewQ.jawaban;
                                            const isUser = userAns === i;
                                            let bg = "rgba(255,255,255,0.03)", border = "1px solid rgba(255,255,255,0.08)", clr = "rgba(255,255,255,0.6)";
                                            if (isAns) { bg = "rgba(16,185,129,0.12)"; border = "1px solid #10b981"; clr = "#6ee7b7"; }
                                            else if (isUser) { bg = "rgba(239,68,68,0.12)"; border = "1px solid #ef4444"; clr = "#fca5a5"; }
                                            return (
                                                <div key={i} style={{ background: bg, border, borderRadius: 12, padding: "12px 16px", display: "flex", alignItems: "center", gap: 10 }}>
                                                    <span style={{ minWidth: 26, height: 26, borderRadius: "50%", background: isAns ? "#10b981" : isUser ? "#ef4444" : "rgba(255,255,255,0.08)", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, flexShrink: 0 }}>
                                                        {isAns ? "✓" : isUser ? "✗" : String.fromCharCode(65 + i)}
                                                    </span>
                                                    <span style={{ color: clr, fontSize: 14 }}>{p}</span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                    <div style={{ background: "rgba(59,130,246,0.08)", border: "1px solid rgba(59,130,246,0.25)", borderRadius: 16, padding: "20px 22px", marginTop: 20 }}>
                                        <div style={{ color: "#60a5fa", fontWeight: 700, fontSize: 13, marginBottom: 8, letterSpacing: 0.5 }}>💡 EXPLANATION</div>
                                        <p style={{ color: "rgba(255,255,255,0.8)", fontSize: 14, lineHeight: 1.7, margin: 0 }}>{reviewQ.pembahasan}</p>
                                    </div>
                                </div>
                                <div style={{ display: "flex", gap: 12 }}>
                                    <button onClick={() => setReviewIdx(i => Math.max(0, i - 1))} disabled={reviewIdx === 0} style={{ flex: 1, background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 12, color: "#fff", padding: 13, cursor: "pointer" }}>← Prev</button>
                                    <button onClick={() => setReviewIdx(i => Math.min(quizQuestions.length - 1, i + 1))} disabled={reviewIdx === quizQuestions.length - 1} style={{ flex: 1, background: "linear-gradient(135deg,#3b82f6,#60a5fa)", border: "none", borderRadius: 12, color: "#fff", padding: 13, cursor: "pointer", fontWeight: 700 }}>Next →</button>
                                </div>
                            </div>
                            <MusicPlayer />
                        </div>
                    );
                }

                return (
                    <div style={{ minHeight: "100vh", background: "linear-gradient(160deg,#0d0d1a,#080a1a,#0d100a)", padding: "40px 16px 100px", fontFamily: "'Source Sans 3',sans-serif" }}>
                        <div style={{ maxWidth: 680, margin: "0 auto", textAlign: "center" }}>
                            <h2 style={{ fontFamily: "'Playfair Display',serif", fontSize: "clamp(28px,5vw,48px)", color: "#fff", margin: "0 0 8px" }}>Quiz Score Result</h2>
                            <div style={{ fontSize: "clamp(48px,10vw,80px)", fontWeight: 900, fontFamily: "'Playfair Display',serif", color: grade.color, lineHeight: 1 }}>{pct}%</div>
                            <div style={{ color: grade.color, fontSize: 20, fontWeight: 700, margin: "8px 0 4px" }}>{grade.label}</div>
                            <p style={{ color: "rgba(255,255,255,0.5)", marginBottom: 36 }}>{score} out of {quizQuestions.length} correct</p>

                            <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
                                <button onClick={() => { setReviewIdx(0); setReviewMode(true); }}
                                    style={{ background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 12, color: "#fff", padding: "13px 24px", cursor: "pointer", fontSize: 15, fontWeight: 600 }}>
                                    📖 Review Questions
                                </button>
                                <button onClick={startQuiz}
                                    style={{ background: "linear-gradient(135deg,#e85d26,#f59e0b)", border: "none", borderRadius: 12, color: "#fff", padding: "13px 28px", cursor: "pointer", fontSize: 15, fontWeight: 700 }}>
                                    🔄 Retake Quiz (Shuffle)
                                </button>
                            </div>
                        </div>
                        <MusicPlayer />
                    </div>
                );
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<QuizUjianSekolahEnglish />);
    </script>
</body>
</html>
