<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <title>Quiz PAK Premium - SMP Kristen Bethel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6C63FF;
            --primary-hover: #5750d1;
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-light: #ffffff;
            --text-muted: #b0bec5;
            --correct: #00e676;
            --wrong: #ff1744;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        h1, h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .audio-upload-container {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .audio-upload-container label {
            font-size: 0.85em;
            color: var(--text-muted);
        }

        input[type="file"] {
            font-size: 0.9em;
            color: var(--text-light);
        }

        input[type="file"]::file-selector-button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            margin-right: 15px;
        }

        input[type="file"]::file-selector-button:hover {
            background: var(--primary-hover);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(108, 99, 255, 0.3);
        }

        .btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Quiz UI */
        #quiz-screen, #result-screen {
            display: none;
        }

        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.9em;
            color: var(--text-muted);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.4s ease;
        }

        .question-text {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options-grid {
            display: grid;
            gap: 15px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 15px 20px;
            border-radius: 12px;
            color: var(--text-light);
            text-align: left;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.2s;
            line-height: 1.4;
        }

        .option-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--text-muted);
        }

        .option-btn.correct {
            background: rgba(0, 230, 118, 0.2);
            border-color: var(--correct);
            color: #b9f6ca;
        }

        .option-btn.wrong {
            background: rgba(255, 23, 68, 0.2);
            border-color: var(--wrong);
            color: #ff8a80;
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .score-display {
            font-size: 3em;
            font-weight: 700;
            color: var(--primary);
            text-align: center;
            margin: 20px 0;
            text-shadow: 0 0 10px rgba(108, 99, 255, 0.4);
        }

        #music-player {
            display: none;
        }
    </style>
</head>

        </div>
    </div>

        // System Variables
        let questions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        const audioElement = document.getElementById('bg-music');
        const fileInput = document.getElementById('audio-file');

        // File reader for background music
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const objectUrl = URL.createObjectURL(file);
                audioElement.src = objectUrl;
            }
        });

        // Fisher-Yates Shuffle Function
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Initialize and Start Quiz
        function startQuiz() {
            // Play music if selected
            if(audioElement.src) {
                audioElement.play().catch(e => console.log("Audio play failed:", e));
            }

            // Shuffle questions and map to structure
            questions = shuffleArray([...rawQuestions]).map(q => {
                let options = [
                    { text: q.c, isCorrect: true },
                    { text: q.w[0], isCorrect: false },
                    { text: q.w[1], isCorrect: false },
                    { text: q.w[2], isCorrect: false }
                ];
                return {
                    questionText: q.q,
                    options: shuffleArray(options)
                };
            });

            currentQuestionIndex = 0;
            score = 0;

            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';

            loadQuestion();
        }

        // Load specific question
        function loadQuestion() {
            const q = questions[currentQuestionIndex];
            document.getElementById('question-counter').innerText = `Soal ${currentQuestionIndex + 1} / ${questions.length}`;
            document.getElementById('score-counter').innerText = `Skor: ${score}`;
            
            // Progress bar
            const progress = ((currentQuestionIndex) / questions.length) * 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;

            document.getElementById('question-text').innerText = q.questionText;
            
            const optionsGrid = document.getElementById('options-grid');
            optionsGrid.innerHTML = ''; // Clear previous

            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                // Add letter prefix A, B, C, D
                const letter = String.fromCharCode(65 + index); 
                btn.innerText = `${letter}. ${opt.text}`;
                btn.onclick = () => selectAnswer(btn, opt.isCorrect, q.options);
                optionsGrid.appendChild(btn);
            });

            document.getElementById('next-btn').style.display = 'none';
        }

        // Handle answer selection
        function selectAnswer(selectedBtn, isCorrect, optionsData) {
            const buttons = document.querySelectorAll('.option-btn');
            
            // Disable all buttons after click
            buttons.forEach(btn => {
                btn.disabled = true;
                // Highlight the correct one regardless of what user picked
                const btnText = btn.innerText.substring(3); // Remove "A. " part for comparison
                const matchedOption = optionsData.find(o => o.text === btnText);
                if (matchedOption && matchedOption.isCorrect) {
                    btn.classList.add('correct');
                }
            });

            if (isCorrect) {
                selectedBtn.classList.add('correct');
                score++;
                document.getElementById('score-counter').innerText = `Skor: ${score}`;
            } else {
                selectedBtn.classList.add('wrong');
            }

            // Show next button
            const nextBtn = document.getElementById('next-btn');
            nextBtn.style.display = 'block';
            
            // Change next button text if it's the last question
            if (currentQuestionIndex === questions.length - 1) {
                nextBtn.innerText = "Lihat Hasil";
            }
        }

        // Move to next question or finish
        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        // Show Final Result
        function showResult() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            const finalScoreElem = document.getElementById('final-score');
            finalScoreElem.innerText = `${score} / ${questions.length}`;

            const messageElem = document.getElementById('result-message');
            const percentage = (score / questions.length) * 100;
            
            if (percentage === 100) {
                messageElem.innerText = "Luar biasa! Pemahaman teologimu sangat sempurna.";
            } else if (percentage >= 80) {
                messageElem.innerText = "Sangat baik! Kamu menguasai materi ini dengan mantap.";
            } else if (percentage >= 50) {
                messageElem.innerText = "Cukup baik, tapi masih perlu mengulang kembali beberapa bagian.";
            } else {
                messageElem.innerText = "Jangan menyerah, mari pelajari lagi firman Tuhan dan materi PAK-nya.";
            }

            // Set progress to 100%
            document.getElementById('progress-fill').style.width = '100%';
        }
