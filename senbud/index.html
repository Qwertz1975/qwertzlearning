            const handleMusicUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const url = URL.createObjectURL(file);
                setMusic(url);
                setMusicName(file.name);
                setPlaying(false);
            };

            const togglePlay = () => {
                if (!audioRef.current) return;
                if (playing) { audioRef.current.pause(); } else { audioRef.current.play(); }
                setPlaying(!playing);
            };

            // Fungsi Acak Soal (Fisher-Yates Shuffle)
            const shuffleArray = (array) => {
                let shuffled = [...array];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            };

            const q = shuffledQuestions[current];

            const handleSelect = (i) => {
                if (selected !== null) return;
                setSelected(i);
                setAnswers(prev => ({ ...prev, [current]: i }));
                setShowPembahasan(true);
            };

            const next = () => {
                setSelected(null);
                setShowPembahasan(false);
                if (current < shuffledQuestions.length - 1) { setCurrent(c => c + 1); }
                else { setPhase("result"); }
            };

            const prev = () => {
                if (current > 0) {
                    setSelected(answers[current - 1] ?? null);
                    setShowPembahasan(answers[current - 1] !== undefined);
                    setCurrent(c => c - 1);
                }
            };

            const startQuiz = () => {
                setShuffledQuestions(shuffleArray(QUESTIONS));
                setCurrent(0); setSelected(null); setAnswers({}); setShowPembahasan(false); setPhase("quiz");
            };

            const score = Object.entries(answers).filter(([idx, ans]) => shuffledQuestions[parseInt(idx)].jawaban === ans).length;
            const pct = Math.round((score / QUESTIONS.length) * 100);

            const grade = pct >= 90 ? { label: "Maestro! 🎶", color: "#f59e0b" }
                : pct >= 80 ? { label: "Sangat Merdu! ✨", color: "#10b981" }
                : pct >= 70 ? { label: "Harmonis! 👍", color: "#3b82f6" }
                : pct >= 60 ? { label: "Cukup 🎻", color: "#8b5cf6" }
                : { label: "Perlu Latihan Lagi 🎼", color: "#ef4444" };

            const MusicPlayer = () => (
                <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "rgba(10,10,20,0.97)", backdropFilter: "blur(16px)", borderTop: "1px solid rgba(255,255,255,0.08)", padding: "10px 24px", display: "flex", alignItems: "center", gap: 16, zIndex: 100 }}>
                    {music && <audio ref={audioRef} src={music} loop onEnded={() => setPlaying(false)} />}
                    <button onClick={() => fileInputRef.current?.click()} style={{ background: "linear-gradient(135deg,#e85d26,#f59e0b)", border: "none", borderRadius: 8, color: "#fff", padding: "7px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap", fontFamily: "inherit" }}>
                        🎵 Upload Musik
                    </button>
                    <input ref={fileInputRef} type="file" accept="audio/*" onChange={handleMusicUpload} style={{ display: "none" }} />
                    {music && (
                        <>
                            <button onClick={togglePlay} style={{ background: playing ? "rgba(232,93,38,0.3)" : "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: "50%", width: 36, height: 36, color: "#fff", cursor: "pointer", fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center" }}>
                                {playing ? "⏸" : "▶"}
                            </button>
                            <span style={{ color: "rgba(255,255,255,0.6)", fontSize: 12, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{musicName}</span>
                            <input type="range" min={0} max={1} step={0.01} value={volume} onChange={e => setVolume(Number(e.target.value))} style={{ width: 80, accentColor: "#e85d26" }} />
                            <span style={{ color: "rgba(255,255,255,0.4)", fontSize: 11 }}>🔊</span>
                        </>
                    )}
                    {!music && <span style={{ color: "rgba(255,255,255,0.35)", fontSize: 12 }}>Upload file musik untuk menemanimu belajar ✨</span>}
                </div>
            );

            // === HOME ===
            if (phase === "home") return (
                <div style={{ minHeight: "100vh", background: "linear-gradient(145deg,#0d0d1a 0%,#1a0a05 50%,#0a1a0d 100%)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "40px 20px 80px", fontFamily: "'Georgia', serif" }}>
                    <style>{`
                        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;600&display=swap');
                        * { box-sizing: border-box; }
                        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(232,93,38,0.3) !important; }
                        .btn-main:hover { transform: scale(1.03); filter: brightness(1.1); }
                        .opt:hover { background: rgba(255,255,255,0.08) !important; border-color: rgba(255,255,255,0.3) !important; }
                    `}</style>

                    <div style={{ position: "fixed", top: -100, right: -100, width: 400, height: 400, borderRadius: "50%", background: "radial-gradient(circle, rgba(232,93,38,0.12) 0%, transparent 70%)", pointerEvents: "none" }} />
                    <div style={{ position: "fixed", bottom: -80, left: -80, width: 300, height: 300, borderRadius: "50%", background: "radial-gradient(circle, rgba(26,122,94,0.1) 0%, transparent 70%)", pointerEvents: "none" }} />

                    <div style={{ textAlign: "center", maxWidth: 680 }}>
                        <div style={{ fontSize: 64, marginBottom: 8 }}>🎶</div>
                        <h1 style={{ fontFamily: "'Playfair Display', serif", fontSize: "clamp(36px,6vw,64px)", fontWeight: 900, color: "#fff", margin: "0 0 8px", lineHeight: 1.1, letterSpacing: "-1px" }}>
                            Quiz Ujian Sekolah
                            <span style={{ display: "block", background: "linear-gradient(90deg,#e85d26,#f59e0b)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Seni Musik</span>
                        </h1>
                        <p style={{ color: "rgba(255,255,255,0.55)", fontSize: 16, fontFamily: "'Source Sans 3',sans-serif", marginBottom: 40 }}>50 Soal Pilihan Ganda · Acak Soal · Teknik Vokal · Alat Musik · Genre</p>

                        <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 16, marginBottom: 40 }}>
                            {[
                                { icon: "🎤", num: "7", label: "Teknik Vokal & Dasar Musik", clr: "#e85d26", sub: "15 soal" },
                                { icon: "🎸", num: "8", label: "Alat Musik & Tradisional", clr: "#1a7a5e", sub: "17 soal" },
                                { icon: "🎷", num: "9", label: "Genre, Sejarah & Modern", clr: "#6b3fa0", sub: "18 soal" }
                            ].map(({ icon, num, label, clr, sub }) => (
                                <div key={num} className="card-hover" style={{ background: "rgba(255,255,255,0.04)", border: `1px solid rgba(255,255,255,0.08)`, borderRadius: 16, padding: "20px 12px", transition: "all 0.3s", cursor: "default" }}>
                                    <div style={{ fontSize: 28 }}>{icon}</div>
                                    <div style={{ fontFamily: "'Playfair Display',serif", fontSize: 28, fontWeight: 900, color: clr }}>Kelas {num}</div>
                                    <div style={{ color: "rgba(255,255,255,0.6)", fontSize: 12, fontFamily: "'Source Sans 3',sans-serif", marginTop: 4 }}>{label}</div>
                                    <div style={{ color: clr, fontSize: 12, fontWeight: 700, marginTop: 4, fontFamily: "'Source Sans 3',sans-serif" }}>{sub}</div>
                                </div>
                            ))}
                        </div>

                        <button className="btn-main" onClick={startQuiz} style={{ background: "linear-gradient(135deg,#e85d26 0%,#f59e0b 100%)", border: "none", borderRadius: 16, color: "#fff", padding: "18px 56px", fontSize: 20, fontWeight: 700, cursor: "pointer", transition: "all 0.25s", fontFamily: "'Playfair Display',serif", letterSpacing: "0.5px", boxShadow: "0 8px 32px rgba(232,93,38,0.4)" }}>
                            Mulai Quiz Musik →
                        </button>
                    </div>
                    <MusicPlayer />
                </div>
            );

            // === QUIZ ===
            if (phase === "quiz") {
                const kinfo = KELAS_INFO[q.kelas];
                const prog = ((current + 1) / shuffledQuestions.length) * 100;
                const answered = Object.keys(answers).length;

                return (
                    <div style={{ minHeight: "100vh", background: "linear-gradient(160deg,#0d0d1a 0%,#1a0d08 60%,#0a100d 100%)", padding: "24px 16px 100px", fontFamily: "'Source Sans 3',Georgia,sans-serif" }}>
                        <div style={{ maxWidth: 720, margin: "0 auto" }}>
                            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                                    <span style={{ background: kinfo.color, color: "#fff", borderRadius: 8, padding: "4px 12px", fontSize: 12, fontWeight: 700 }}>{kinfo.label}</span>
                                    <span style={{ background: "rgba(255,255,255,0.07)", color: "rgba(255,255,255,0.6)", borderRadius: 8, padding: "4px 10px", fontSize: 12 }}>{q.topik}</span>
                                </div>
                                <span style={{ color: "rgba(255,255,255,0.5)", fontSize: 13 }}>{answered}/{shuffledQuestions.length} dijawab</span>
                            </div>

                            <div style={{ background: "rgba(255,255,255,0.07)", borderRadius: 99, height: 6, marginBottom: 24 }}>
                                <div style={{ width: `${prog}%`, height: "100%", borderRadius: 99, background: `linear-gradient(90deg,${kinfo.color},#f59e0b)`, transition: "width 0.4s ease" }} />
                            </div>

                            <div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 20, padding: "32px 28px", marginBottom: 16 }}>
                                <div style={{ color: "rgba(255,255,255,0.35)", fontSize: 13, marginBottom: 12, fontWeight: 600, letterSpacing: 1 }}>SOAL {current + 1} / 50</div>
                                <p style={{ color: "#fff", fontSize: "clamp(15px,2.5vw,18px)", lineHeight: 1.7, margin: "0 0 28px", fontFamily: "'Playfair Display',serif" }}>{q.soal}</p>

                                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                                    {q.pilihan.map((p, i) => {
                                        const isCorrect = i === q.jawaban;
                                        const isSelected = selected === i;
                                        const revealed = selected !== null;
                                        let bg = "rgba(255,255,255,0.04)";
                                        let border = "1px solid rgba(255,255,255,0.1)";
                                        let txtColor = "rgba(255,255,255,0.8)";
                                        if (revealed) {
                                            if (isCorrect) { bg = "rgba(16,185,129,0.15)"; border = "1px solid #10b981"; txtColor = "#6ee7b7"; }
                                            else if (isSelected) { bg = "rgba(239,68,68,0.15)"; border = "1px solid #ef4444"; txtColor = "#fca5a5"; }
                                        }
                                        return (
                                            <div key={i} className={revealed ? "" : "opt"} onClick={() => handleSelect(i)}
                                                style={{ background: bg, border, borderRadius: 12, padding: "14px 18px", display: "flex", alignItems: "flex-start", gap: 12, cursor: revealed ? "default" : "pointer" }}>
                                                <span style={{ minWidth: 28, height: 28, borderRadius: "50%", background: revealed && isCorrect ? "#10b981" : revealed && isSelected ? "#ef4444" : "rgba(255,255,255,0.1)", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, flexShrink: 0 }}>
                                                    {revealed && isCorrect ? "✓" : revealed && isSelected && !isCorrect ? "✗" : String.fromCharCode(65 + i)}
                                                </span>
                                                <span style={{ color: txtColor, fontSize: 15, lineHeight: 1.5, paddingTop: 2 }}>{p}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {showPembahasan && (
                                <div style={{ background: "rgba(245,158,11,0.08)", border: "1px solid rgba(245,158,11,0.25)", borderRadius: 16, padding: "20px 22px", marginBottom: 16 }}>
                                    <div style={{ color: "#f59e0b", fontWeight: 700, fontSize: 13, marginBottom: 8, letterSpacing: 0.5 }}>💡 PEMBAHASAN</div>
                                    <p style={{ color: "rgba(255,255,255,0.8)", fontSize: 14, lineHeight: 1.7, margin: 0 }}>{q.pembahasan}</p>
                                </div>
                            )}

                            <div style={{ display: "flex", gap: 12, justifyContent: "space-between" }}>
                                <button className="btn-nav" onClick={prev} disabled={current === 0}
                                    style={{ background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 12, color: current === 0 ? "rgba(255,255,255,0.2)" : "#fff", padding: "13px 24px", fontSize: 15, fontWeight: 600, cursor: current === 0 ? "not-allowed" : "pointer", transition: "all 0.2s", fontFamily: "inherit" }}>
                                    ← Sebelumnya
                                </button>
                                {selected !== null && (
                                    <button className="btn-nav" onClick={next}
                                        style={{ background: current === shuffledQuestions.length - 1 ? "linear-gradient(135deg,#6b3fa0,#e85d26)" : "linear-gradient(135deg,#e85d26,#f59e0b)", border: "none", borderRadius: 12, color: "#fff", padding: "13px 28px", fontSize: 15, fontWeight: 700, cursor: "pointer", transition: "all 0.2s", fontFamily: "inherit", boxShadow: "0 4px 20px rgba(232,93,38,0.3)" }}>
                                        {current === shuffledQuestions.length - 1 ? "🏁 Lihat Hasil" : "Selanjutnya →"}
                                    </button>
                                )}
                            </div>
                        </div>
                        <MusicPlayer />
                    </div>
                );
            }

            // === RESULT ===
            if (phase === "result") {
                const byKelas = [7, 8, 9].map(k => {
                    const qs = shuffledQuestions.filter((q2) => q2.kelas === k);
                    const correct = qs.filter((q2) => {
                        const globalIdx = shuffledQuestions.indexOf(q2);
                        return answers[globalIdx] === q2.jawaban;
                    }).length;
                    return { kelas: k, total: qs.length, correct };
                });

                if (reviewMode) {
                    const reviewQ = shuffledQuestions[reviewIdx];
                    const kinfo = KELAS_INFO[reviewQ.kelas];
                    const userAns = answers[reviewIdx];
                    const isCorrect = userAns === reviewQ.jawaban;
                    return (
                        <div style={{ minHeight: "100vh", background: "linear-gradient(160deg,#0d0d1a,#1a0d08)", padding: "24px 16px 100px", fontFamily: "'Source Sans 3',sans-serif" }}>
                            <div style={{ maxWidth: 720, margin: "0 auto" }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
                                    <button onClick={() => setReviewMode(false)} style={{ background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 10, color: "#fff", padding: "8px 16px", cursor: "pointer", fontSize: 14, fontFamily: "inherit" }}>← Kembali</button>
                                    <span style={{ color: "rgba(255,255,255,0.5)", fontSize: 14 }}>Review Soal {reviewIdx + 1} / 50</span>
                                </div>

                                <div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 20, padding: "28px", marginBottom: 16 }}>
                                    <p style={{ color: "#fff", fontSize: 17, lineHeight: 1.7, fontFamily: "'Playfair Display',serif", marginBottom: 24 }}>{reviewQ.soal}</p>
                                    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                                        {reviewQ.pilihan.map((p, i) => {
                                            const isAns = i === reviewQ.jawaban;
                                            const isUser = userAns === i;
                                            let bg = "rgba(255,255,255,0.03)", border = "1px solid rgba(255,255,255,0.08)", clr = "rgba(255,255,255,0.6)";
                                            if (isAns) { bg = "rgba(16,185,129,0.12)"; border = "1px solid #10b981"; clr = "#6ee7b7"; }
                                            else if (isUser) { bg = "rgba(239,68,68,0.12)"; border = "1px solid #ef4444"; clr = "#fca5a5"; }
                                            return (
                                                <div key={i} style={{ background: bg, border, borderRadius: 12, padding: "12px 16px", display: "flex", alignItems: "center", gap: 10 }}>
                                                    <span style={{ minWidth: 26, height: 26, borderRadius: "50%", background: isAns ? "#10b981" : isUser ? "#ef4444" : "rgba(255,255,255,0.08)", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, flexShrink: 0 }}>
                                                        {isAns ? "✓" : isUser ? "✗" : String.fromCharCode(65 + i)}
                                                    </span>
                                                    <span style={{ color: clr, fontSize: 14 }}>{p}</span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                                <div style={{ display: "flex", gap: 12 }}>
                                    <button onClick={() => setReviewIdx(i => Math.max(0, i - 1))} disabled={reviewIdx === 0} style={{ flex: 1, background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 12, color: "#fff", padding: 13, cursor: "pointer" }}>← Prev</button>
                                    <button onClick={() => setReviewIdx(i => Math.min(49, i + 1))} disabled={reviewIdx === 49} style={{ flex: 1, background: "linear-gradient(135deg,#e85d26,#f59e0b)", border: "none", borderRadius: 12, color: "#fff", padding: 13, cursor: "pointer", fontWeight: 700 }}>Next →</button>
                                </div>
                            </div>
                            <MusicPlayer />
                        </div>
                    );
                }

                return (
                    <div style={{ minHeight: "100vh", background: "linear-gradient(160deg,#0d0d1a,#1a0d08,#0a100d)", padding: "40px 16px 100px", fontFamily: "'Source Sans 3',sans-serif" }}>
                        <div style={{ maxWidth: 680, margin: "0 auto", textAlign: "center" }}>
                            <h2 style={{ fontFamily: "'Playfair Display',serif", fontSize: "clamp(28px,5vw,48px)", color: "#fff", margin: "0 0 8px" }}>Hasil Quiz Seni Musik</h2>
                            <div style={{ fontSize: "clamp(48px,10vw,80px)", fontWeight: 900, fontFamily: "'Playfair Display',serif", color: grade.color, lineHeight: 1 }}>{pct}%</div>
                            <div style={{ color: grade.color, fontSize: 20, fontWeight: 700, margin: "8px 0 4px" }}>{grade.label}</div>
                            <p style={{ color: "rgba(255,255,255,0.5)", marginBottom: 36 }}>{score} dari {QUESTIONS.length} soal benar</p>

                            <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 12, marginBottom: 32 }}>
                                {byKelas.map(({ kelas, total, correct }) => {
                                    const kinfo = KELAS_INFO[kelas];
                                    const p = Math.round((correct / total) * 100);
                                    return (
                                        <div key={kelas} style={{ background: "rgba(255,255,255,0.04)", border: `1px solid ${kinfo.color}33`, borderRadius: 16, padding: "18px 12px" }}>
                                            <div style={{ color: kinfo.color, fontWeight: 900, fontFamily: "'Playfair Display',serif", fontSize: 28 }}>{p}%</div>
                                            <div style={{ color: "#fff", fontWeight: 700, fontSize: 14 }}>Kelas {kelas}</div>
                                            <div style={{ color: "rgba(255,255,255,0.4)", fontSize: 12 }}>{correct}/{total} benar</div>
                                        </div>
                                    );
                                })}
                            </div>

                            <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
                                <button onClick={() => { setReviewIdx(0); setReviewMode(true); }}
                                    style={{ background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 12, color: "#fff", padding: "13px 24px", cursor: "pointer", fontSize: 15, fontWeight: 600 }}>
                                    📖 Review Soal
                                </button>
                                <button onClick={startQuiz}
                                    style={{ background: "linear-gradient(135deg,#e85d26,#f59e0b)", border: "none", borderRadius: 12, color: "#fff", padding: "13px 28px", cursor: "pointer", fontSize: 15, fontWeight: 700 }}>
                                    🔄 Ulangi Quiz
                                </button>
                            </div>
                        </div>
                        <MusicPlayer />
                    </div>
                );
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<QuizUjianSekolahSeniMusik />);
    </script>
</body>
</html>
