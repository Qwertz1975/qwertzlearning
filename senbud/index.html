<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Master Seni Budaya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Glassmorphism Effect */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Custom Audio Input Hide */
        input[type="file"] {
            display: none;
        }

        /* Option Styling & Animations */
        .option-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .option-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .correct {
            background: rgba(16, 185, 129, 0.2) !important;
            border-color: #10b981 !important;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
            color: #34d399;
        }

        .wrong {
            background: rgba(239, 68, 68, 0.2) !important;
            border-color: #ef4444 !important;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
            color: #f87171;
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Progress Bar */
        .progress-bar {
            transition: width 0.4s ease;
        }
    </style>
</head>
<body class="p-4 sm:p-8">

    <!-- Header & Audio Player -->
    <div class="max-w-3xl mx-auto w-full mb-8 flex flex-col sm:flex-row justify-between items-center gap-4 fade-in">
        <div>
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                Ujian Praktik Master
            </h1>
            <p class="text-gray-400 text-sm mt-1">Seni Budaya - Tingkat Analisis Lanjut</p>
        </div>

        <div class="glass-panel p-3 rounded-xl flex items-center gap-4">
            <label class="cursor-pointer flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 transition px-4 py-2 rounded-lg text-sm font-semibold">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M17.707 9.293a1 1 0 010 1.414l-7 7a1 1 0 01-1.414 0l-7-7A.997.997 0 012 10V5a3 3 0 013-3h5c.256 0 .512.098.707.293l7 7zM5 6a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd" />
                </svg>
                Pilih Lagu
                <input type="file" id="audioUpload" accept="audio/*">
            </label>
            <audio id="audioPlayer" controls class="h-8 w-48 hidden rounded-lg"></audio>
        </div>
    </div>

    <!-- Main Quiz Area -->
    <div class="max-w-3xl mx-auto w-full glass-panel rounded-2xl p-6 sm:p-10 fade-in" id="quizContainer">
        
        <!-- Progress -->
        <div class="mb-8">
            <div class="flex justify-between text-sm text-gray-400 mb-2">
                <span id="questionCount">Soal 1 dari 10</span>
                <span id="scoreText">Skor: 0</span>
            </div>
            <div class="w-full bg-gray-700 rounded-full h-2">
                <div id="progressBar" class="bg-gradient-to-r from-blue-500 to-purple-500 h-2 rounded-full progress-bar" style="width: 0%"></div>
            </div>
        </div>

        <!-- Question Text -->
        <h2 id="questionText" class="text-xl sm:text-2xl font-semibold mb-6 leading-relaxed">
            <!-- Teks soal akan dimuat di sini -->
        </h2>

        <!-- Question Image (Hidden by default) -->
        <div id="imageContainer" class="hidden mb-8 w-full flex justify-center">
            <img id="questionImage" alt="" class="rounded-xl shadow-2xl border border-gray-600/50 max-h-72 object-contain bg-black/20 p-2">
        </div>

        <!-- Options -->
        <div id="optionsContainer" class="flex flex-col gap-4">
            <!-- Tombol pilihan akan dimuat di sini -->
        </div>

        <!-- Next Button (Hidden by default) -->
        <div class="mt-8 flex justify-end">
            <button id="nextBtn" class="hidden bg-white text-gray-900 px-8 py-3 rounded-xl font-bold hover:bg-gray-200 transition transform hover:scale-105">
                Lanjut ke Soal Berikutnya ➔
            </button>
        </div>
    </div>

    <!-- Result Screen (Hidden by default) -->
    <div id="resultScreen" class="max-w-3xl mx-auto w-full glass-panel rounded-2xl p-10 text-center hidden fade-in">
        <h2 class="text-4xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-green-400 to-blue-500">Kuis Selesai!</h2>
        <div class="text-6xl font-black mb-6" id="finalScore">100</div>
        <p id="feedbackText" class="text-xl text-gray-300 mb-8">Luar Biasa! Pemahaman analisismu sangat tajam.</p>
        <button onclick="location.reload()" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 transition">
            ↻ Ulangi Kuis
        </button>
    </div>

    <script>
        // --- FITUR AUDIO ---
        const audioUpload = document.getElementById('audioUpload');
        const audioPlayer = document.getElementById('audioPlayer');

        audioUpload.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const objectUrl = URL.createObjectURL(file);
                audioPlayer.src = objectUrl;
                audioPlayer.classList.remove('hidden');
                audioPlayer.play();
            }
        });

        // --- DATA SOAL SANGAT SUSAH (7 Teks + 3 Gambar) ---
        // Menggunakan Image Proxy (wsrv.nl) untuk bypass pemblokiran gambar
        const rawQuestions = [
            {
                question: "Berdasarkan bagan kriteria penjurian, manakah elemen di bawah ini yang BUKAN merupakan sub-kategori/turunan dari 'Teknik Vokal', melainkan kriteria utama yang berdiri sendiri setara dengan penampilan?",
                options: [
                    { text: "Interpretasi", correct: true },
                    { text: "Artikulasi (Pelafalan)", correct: false },
                    { text: "Phrasering", correct: false },
                    { text: "Birama", correct: false }
                ]
            },
            {
                question: "Sebuah ansambel memainkan melodi yang sedih dengan interval susunan nada: 1 - 1½ - 1 - 1 - 1½ - 1 - 1. Merujuk pada catatan tangga nada, susunan tersebut mutlak diawali dari titik nada...",
                options: [
                    { text: "6 (La)", correct: true },
                    { text: "1 (Do)", correct: false },
                    { text: "3 (Mi)", correct: false },
                    { text: "5 (Sol)", correct: false }
                ]
            },
            {
                question: "Instrumen 'Gambang Kromong' asal Betawi diidentikkan dengan seni pertunjukan 'Lenong'. Jika ditinjau dari cara menghasilkan bunyi (berdasarkan sumber bunyi), instrumen ini secara spesifik termasuk dalam klasifikasi...",
                options: [
                    { text: "Kordofon (karena memiliki senar dan digesek)", correct: true },
                    { text: "Idiofon (karena bunyinya dari alat itu sendiri)", correct: false },
                    { text: "Membranofon (karena ditepuk pada membran)", correct: false },
                    { text: "Airofon (karena dihembuskan udara)", correct: false }
                ]
            },
            {
                question: "Jika kamu membandingkan sistem tangga nada alat musik daerah, berapakah selisih matematis jumlah nada antara sistem 'Kromatik' secara utuh dibandingkan dengan sistem 'Pentatonik'?",
                options: [
                    { text: "7 Nada", correct: true }, // 12 - 5 = 7
                    { text: "5 Nada", correct: false },
                    { text: "12 Nada", correct: false },
                    { text: "2 Nada", correct: false }
                ]
            },
            {
                question: "Dari daftar instrumen mancanegara, manakah dua alat musik yang memiliki kesamaan identik dalam teknik memainkannya secara fisik?",
                options: [
                    { text: "Saung Gauk (Myanmar) dan Rondala (Filipina)", correct: true }, // Keduanya dipetik
                    { text: "Gulintangan (Brunei) dan Rondala (Filipina)", correct: false },
                    { text: "Saung Gauk (Myanmar) dan Gulintangan (Brunei)", correct: false },
                    { text: "Sasando (NTT) dan Gulintangan (Brunei)", correct: false }
                ]
            },
            {
                question: "Seorang dirigen paduan suara membutuhkan alat bantu untuk menentukan tempo lagu secara konstan, sekaligus referensi frekuensi untuk menyamakan nada dasar penyanyi. Dua alat yang secara akurat merepresentasikan fungsi tersebut adalah...",
                options: [
                    { text: "Metronome dan Pipa Nada", correct: true },
                    { text: "Birama dan Tuts Piano", correct: false },
                    { text: "Tuts Garis Para Nada dan Kunci Nada", correct: false },
                    { text: "Artikulasi dan Phrasering", correct: false }
                ]
            },
            {
                question: "Dalam pembagian wilayah suara, seorang penyanyi wanita menyadari suaranya tidak cukup tinggi untuk mencapai Sopran, namun terlalu tinggi jika dipaksa menyanyi di wilayah Alto. Maka wilayah suaranya disebut...",
                options: [
                    { text: "Mezzo Sopran", correct: true },
                    { text: "Tenor", correct: false },
                    { text: "Bariton", correct: false },
                    { text: "Sopran Minor", correct: false }
                ]
            },
            // --- SOAL GAMBAR ---
            {
                question: "Gambar di bawah ini menampilkan sebuah ansambel gamelan yang unik karena material utamanya menggunakan bambu besar, bukan perunggu. Berdasarkan kisi-kisi, dari manakah asal kesenian ini?",
                image: "https://wsrv.nl/?url=upload.wikimedia.org/wikipedia/commons/thumb/2/29/Gamelan_jegog_instruments.jpg/640px-Gamelan_jegog_instruments.jpg",
                imageAlt: "[Gambar Gamelan Jegog]",
                options: [
                    { text: "Bali", correct: true },
                    { text: "Sunda", correct: false },
                    { text: "Betawi", correct: false },
                    { text: "Halmahera", correct: false }
                ]
            },
            {
                question: "Perhatikan struktur unik alat musik di bawah ini yang memanfaatkan daun lontar sebagai resonansinya. Alat musik ini dimainkan dengan cara dipetik. Apakah nama alat musik ini dan dari mana asalnya?",
                image: "https://wsrv.nl/?url=upload.wikimedia.org/wikipedia/commons/thumb/1/15/Sasando.jpg/640px-Sasando.jpg",
                imageAlt: "[Gambar Sasando]",
                options: [
                    { text: "Sasando dari Nusa Tenggara Timur", correct: true },
                    { text: "Rindik dari Nusa Tenggara Timur", correct: false },
                    { text: "Hitada dari Halmahera", correct: false },
                    { text: "Rondala dari Filipina", correct: false }
                ]
            },
            {
                question: "Berdasarkan ciri fisiknya yang menyerupai harpa melengkung, instrumen mancanegara yang dimainkan dengan cara dipetik pada gambar di bawah ini adalah...",
                image: "https://wsrv.nl/?url=upload.wikimedia.org/wikipedia/commons/thumb/9/91/Saung.jpg/640px-Saung.jpg",
                imageAlt: "[Gambar Saung Gauk]",
                options: [
                    { text: "Saung Gauk dari Myanmar", correct: true },
                    { text: "Rondala dari Filipina", correct: false },
                    { text: "Gulintangan dari Brunei Darussalam", correct: false },
                    { text: "Gambang dari Betawi", correct: false }
                ]
            }
        ];

        // --- LOGIKA KUIS ---
        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;

        // Fungsi Acak (Fisher-Yates)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Inisialisasi Kuis
        function initQuiz() {
            // Acak urutan soal
            currentQuestions = shuffleArray([...rawQuestions]);
            // Acak pilihan ganda di dalam setiap soal
            currentQuestions.forEach(q => {
                q.options = shuffleArray([...q.options]);
            });
            loadQuestion();
        }

        // Muat Soal ke Layar
        function loadQuestion() {
            answered = false;
            document.getElementById('nextBtn').classList.add('hidden');
            
            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('questionText').innerText = q.question;
            
            // Logika Tampilkan/Sembunyikan Gambar
            const imageContainer = document.getElementById('imageContainer');
            const questionImage = document.getElementById('questionImage');
            
            if (q.image) {
                // Hapus fungsi onerror yang menyebabkan stuck sebelumnya
                questionImage.onerror = null;
                questionImage.src = q.image;
                questionImage.alt = q.imageAlt || "[Gambar Alat Musik]";
                imageContainer.classList.remove('hidden');
            } else {
                imageContainer.classList.add('hidden');
                questionImage.removeAttribute('src'); 
                questionImage.alt = '';
            }
            
            // Update Progress
            const progressPercent = ((currentQuestionIndex) / currentQuestions.length) * 100;
            document.getElementById('progressBar').style.width = progressPercent + '%';
            document.getElementById('questionCount').innerText = `Soal ${currentQuestionIndex + 1} dari ${currentQuestions.length}`;

            // Render Tombol
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full text-left p-4 rounded-xl text-lg font-medium bg-white/5 cursor-pointer';
                btn.innerHTML = `<span class="inline-block w-8 font-bold opacity-50">${String.fromCharCode(65 + index)}.</span> ${opt.text}`;
                
                // Event Listener Klik Jawaban
                btn.onclick = () => selectAnswer(btn, opt.correct, q.options);
                optionsContainer.appendChild(btn);
            });

            // Re-trigger animasi
            const quizContainer = document.getElementById('quizContainer');
            quizContainer.classList.remove('fade-in');
            void quizContainer.offsetWidth; 
            quizContainer.classList.add('fade-in');
        }

        // Handle Pilihan User
        function selectAnswer(selectedBtn, isCorrect, options) {
            if (answered) return; // Mencegah klik dua kali
            answered = true;

            const allBtns = document.querySelectorAll('.option-btn');
            
            // Matikan semua tombol
            allBtns.forEach(btn => btn.disabled = true);

            if (isCorrect) {
                selectedBtn.classList.add('correct');
                score += 10; // Maks 100 (10 soal x 10)
                document.getElementById('scoreText').innerText = `Skor: ${score}`;
            } else {
                selectedBtn.classList.add('wrong');
                // Cari dan tandai jawaban yang benar
                options.forEach((opt, idx) => {
                    if (opt.correct) {
                        allBtns[idx].classList.add('correct');
                    }
                });
            }

            // Tampilkan tombol lanjut
            document.getElementById('nextBtn').classList.remove('hidden');
        }

        // Navigasi Soal Berikutnya
        document.getElementById('nextBtn').addEventListener('click', () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < currentQuestions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        });

        // Tampilkan Layar Hasil
        function showResult() {
            document.getElementById('quizContainer').classList.add('hidden');
            document.getElementById('resultScreen').classList.remove('hidden');
            
            const finalScoreElement = document.getElementById('finalScore');
            const feedbackText = document.getElementById('feedbackText');
            
            finalScoreElement.innerText = score;

            if (score === 100) {
                feedbackText.innerText = "Sempurna! Kamu pantas dapat nilai A+ di Ujian Praktik.";
                finalScoreElement.className = "text-6xl font-black mb-6 text-green-400";
            } else if (score >= 75) {
                feedbackText.innerText = "Hebat! Analisismu sudah sangat bagus.";
                finalScoreElement.className = "text-6xl font-black mb-6 text-blue-400";
            } else if (score >= 50) {
                feedbackText.innerText = "Cukup baik, tapi pastikan membaca kisi-kisi lebih teliti lagi.";
                finalScoreElement.className = "text-6xl font-black mb-6 text-yellow-400";
            } else {
                feedbackText.innerText = "Waduh, sepertinya kamu harus membaca catatan dengan lebih detail lagi!";
                finalScoreElement.className = "text-6xl font-black mb-6 text-red-400";
            }
        }

        // Mulai aplikasi
        initQuiz();

    </script>
</body>
</html>
